<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>myHQ Training</title>
  <script>
    // Redirect /page.html → /myHQBuddy/page.html
    var path = window.location.pathname;
    var base = '/myHQBuddy';
    if (path.indexOf(base) === -1) {
      var page = path.split('/').pop() || '';
      window.location.replace(base + '/' + (page || ''));
    } else {
      window.location.replace(base + '/');
    }
  </script>
</head>
<body></body>
</html>
