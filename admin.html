async function refreshPillStatuses() {
  const allChapters = Object.values(COURSES).flat().flatMap(g => g.chapters).filter(c => c.available);
  await Promise.all(allChapters.map(async ch => {
    const [draftSnap, liveSnap] = await Promise.all([
      db.collection('content-drafts').doc(ch.id).get(),
      db.collection('content').doc(ch.id).get()
    ]);
    if (draftSnap.exists) {
      const d = draftSnap.data();
      const live = liveSnap.exists ? liveSnap.data() : {};
      // Only count keys that actually differ from live (ignore _draftStatus)
      const realChanges = Object.keys(d).filter(k => k !== '_draftStatus' && d[k] !== live[k]);
      if (realChanges.length > 0) {
        pillStatuses[ch.id] = { hasDraft: true, draftStatus: d._draftStatus || 'pending' };
      } else {
        // Stale doc — clean it up
        db.collection('content-drafts').doc(ch.id).delete();
        pillStatuses[ch.id] = { hasDraft: false, draftStatus: null };
      }
    } else {
      pillStatuses[ch.id] = { hasDraft: false, draftStatus: null };
    }
  }));
  renderCoursePills();
  renderChapterPills();
}

function updatePillStatus(chId, hasDraft, draftStatus) {
  pillStatuses[chId] = { hasDraft, draftStatus };
  // Refresh callout for this chapter
  const calloutEl = document.getElementById('callout-' + chId);
  const pillEl    = document.getElementById('pill-' + chId);
  const isPending = isMasterAdmin && hasDraft && draftStatus === 'pending';
  if (calloutEl) calloutEl.innerHTML = isPending ? `<span class="pill-callout status-pending">Pending review</span>` : '';
  if (pillEl) {
    pillEl.classList.toggle('has-pending', isPending);
  }
  // Re-render course pills to update their highlight
  renderCoursePills();
}

async function loadChapter(chId, btn) {
  currentChapterId = chId;
  document.querySelectorAll('.chapter-pill').forEach(p => p.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const def = CHAPTER_DEFS[chId];
  if (!def) return;
  document.getElementById('edit-chapter-label').textContent = def.label;
  document.getElementById('draft-indicator').textContent = '';
  document.getElementById('sync-msg').textContent = '';
  document.getElementById('diff-card').style.display = 'none';
  document.getElementById('edit-editor-card').style.display = '';
  fieldAccepted = {};

  // Load live + draft in parallel
  const [liveSnap, draftSnap] = await Promise.all([
    db.collection('content').doc(chId).get(),
    db.collection('content-drafts').doc(chId).get()
  ]);
  liveData  = liveSnap.exists  ? liveSnap.data()  : {};

  // Strip stale HTML tags from non-body/outcome fields (cleanup from old data)
  Object.keys(liveData).forEach(k => {
    if (k.indexOf('-body') === -1 && k.indexOf('-outcome') === -1 && typeof liveData[k] === 'string') {
      liveData[k] = stripHtml(liveData[k]);
    }
  });

  const rawDraft = draftSnap.exists ? draftSnap.data() : {};

  // Seed Firestore with defaults for any field not yet written
  const allFields = [...def.slideFields, ...def.contentFields, ...def.assessFields];
  const missing = {};
  allFields.forEach(f => {
    if (f.default === '') return;
    const stored = liveData[f.id];
    if (stored === undefined) {
      missing[f.id] = f.default;
    }
  });
  if (Object.keys(missing).length) {
    await db.collection('content').doc(chId).set(missing, { merge: true });
    Object.assign(liveData, missing);
  }

  // Strip draft fields identical to live (stale/rejected values) and _draftStatus
  draftData = {};
  Object.keys(rawDraft).forEach(k => {
    if (k === '_draftStatus') return;
    let val = rawDraft[k];
    if (k.indexOf('-body') === -1 && k.indexOf('-outcome') === -1 && typeof val === 'string') {
      val = stripHtml(val);
    }
    if (val !== liveData[k]) draftData[k] = val;
  });

  // If no real content differences remain, delete the draft doc entirely
  if (Object.keys(draftData).length === 0 && draftSnap.exists) {
    db.collection('content-drafts').doc(chId).delete();
    updatePillStatus(chId, false, null);
  }

  currentEditTab = def.slideFields.length > 0 ? 'slide' : def.contentFields.length > 0 ? 'content' : 'assess';
  ['slide','content','assess'].forEach(t => {
    const el = document.getElementById('subtab-' + t);
    if (el) el.classList.toggle('active', t === currentEditTab);
  });
  renderEditFields();

  updateSyncArea();
}

function updateSyncArea() {
  const syncArea = document.getElementById('sync-area');
  if (!syncArea) return;
  const hasDraft = Object.keys(draftData).filter(k => k !== '_draftStatus').length > 0;
  if (!hasDraft) { syncArea.innerHTML = ''; return; }
  const badge = `<span style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:6px 12px;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;">Submitted for Review</span>`;
  if (isMasterAdmin) {
    syncArea.innerHTML = `<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">${badge}<button class="sync-btn" onclick="showDiff()">Review Changes →</button></div>`;
  } else {
    syncArea.innerHTML = badge;
  }
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function stripHtml(str) {
  return String(str).replace(/<[^>]*>/g, '');
}

/* ──────────────────────────────────────────────────────────────────────────
   RICH BODY TEXT ↔ HTML
   Read-Mode "body" fields are injected into the chapter front-end via
   innerHTML, so they are stored as HTML. To let admins edit them as plain
   text (no tags), we convert HTML→text on load and text→HTML on save.

   Supported vocabulary (lossless round-trip):
     <p class="section-body">…</p>      ⇄  a paragraph (blank-line separated)
     <h3 class="section-subhead">…</h3>  ⇄  a line starting with "## "
     <ul class="section-list"><li>…</li> ⇄  lines starting with "- "
     <strong>…</strong>                  ⇄  **bold**
     <em>…</em>                          ⇄  *italic*

   If a body contains anything outside this vocabulary (inline-styled divs,
   icons, spans, callouts, etc.) we DO NOT convert it — the field falls back
   to raw-HTML editing so the hand-tuned layout is never flattened.
   ────────────────────────────────────────────────────────────────────────── */

// A body field id that is eligible for text editing.
function isBodyFieldId(id) {
  return /-body\d*$/.test(id) || /-intro-body$/.test(id);
}

// Returns true only if the HTML uses solely the supported vocabulary, so the
// text↔HTML round-trip is safe. Anything else → keep raw HTML editing.
// Per-field cache of the original minicard-grid markup, so icons, grid column
// styles, and card classes survive the text↔HTML round-trip untouched. Keyed by
// field id; each entry holds the grid's opening tag plus each card's template
// (icon + wrapper), captured on load and re-applied on save by card position.
const richGridCache = {};

// Pull every minicard-grid block out of a body, returning {stripped, grids}.
// `stripped` is the body with each grid replaced by a placeholder token so the
// rest can be validated/converted with the normal p/h3/ul vocabulary.
function extractGrids(html) {
  const grids = [];
  const stripped = String(html).replace(
    /<div\b[^>]*\bclass="minicard-grid"[^>]*>[\s\S]*?<\/div>\s*<\/div>/gi,
    function (block) {
      // The greedy-then-backtrack above can over/under-match nested divs, so
      // re-balance precisely from the matched start.
      grids.push(block);
      return '␀GRID' + (grids.length - 1) + '␀';
    }
  );
  return { stripped, grids };
}

// Depth-aware: given html and the index just after a grid's opening '>', return
// the inner content up to the matching </div>. Used to parse cards safely.
function balancedDivInner(html, fromIdx) {
  const re = /<(\/?)div\b[^>]*?(\/?)>/gi;
  re.lastIndex = fromIdx;
  let depth = 1, m;
  while ((m = re.exec(html)) !== null) {
    if (m[2] === '/') continue;
    if (m[1] === '') depth++;
    else { depth--; if (depth === 0) return html.slice(fromIdx, m.index); }
  }
  return html.slice(fromIdx);
}

// Re-extract grids with correct nesting (the regex in extractGrids is a coarse
// finder; this returns precise grid spans). Returns array of {open, inner}.
function findGrids(html) {
  const s = String(html);
  const out = [];
  const open = /<div\b([^>]*)\bclass="minicard-grid"([^>]*)>/gi;
  let m;
  while ((m = open.exec(s)) !== null) {
    const innerStart = m.index + m[0].length;
    const inner = balancedDivInner(s, innerStart);
    out.push({ openTag: m[0], inner, start: m.index, end: innerStart + inner.length + 6 /* </div> */ });
  }
  return out;
}

// Parse the cards inside a grid's inner HTML. Each card: optional <i> icon,
// a <div class="mc-t">title</div>, a <div class="mc-b">body</div>.
function parseCards(inner) {
  const cards = [];
  const cardRe = /<div\b[^>]*\bclass="minicard"[^>]*>([\s\S]*?)<\/div>\s*<\/div>/gi;
  // Walk cards depth-aware instead, to be safe with the trailing </div></div>.
  const openRe = /<div\b([^>]*)\bclass="minicard"([^>]*)>/gi;
  let m;
  while ((m = openRe.exec(inner)) !== null) {
    const cardInner = balancedDivInner(inner, m.index + m[0].length);
    const iconM = cardInner.match(/<i\b[^>]*><\/i>/i);
    const tM = cardInner.match(/<div\b[^>]*\bclass="mc-t"[^>]*>([\s\S]*?)<\/div>/i);
    const bM = cardInner.match(/<div\b[^>]*\bclass="mc-b"[^>]*>([\s\S]*?)<\/div>/i);
    cards.push({
      openTag: m[0],
      icon: iconM ? iconM[0] : '',
      titleOpen: (cardInner.match(/<div\b[^>]*\bclass="mc-t"[^>]*>/i) || ['<div class="mc-t">'])[0],
      bodyOpen:  (cardInner.match(/<div\b[^>]*\bclass="mc-b"[^>]*>/i) || ['<div class="mc-b">'])[0],
      title: tM ? tM[1].trim() : '',
      body:  bM ? bM[1].trim() : ''
    });
    openRe.lastIndex = m.index + m[0].length;
  }
  return cards;
}

function isRichConvertible(html) {
  const s = String(html);
  if (s.trim() === '') return true;
  // Pull minicard grids aside first — they're a supported rich block whose
  // structure we preserve verbatim.
  const grids = findGrids(s);
  let body = s;
  // Replace each grid span with nothing for the structural check below.
  if (grids.length) {
    // Rebuild body without the grid spans (back-to-front to keep indices valid).
    for (let i = grids.length - 1; i >= 0; i--) {
      body = body.slice(0, grids[i].start) + ' ' + body.slice(grids[i].end);
    }
    // Every grid must parse into well-formed cards, else fall back to raw HTML.
    for (const g of grids) {
      const cards = parseCards(g.inner);
      if (!cards.length || cards.some(c => c.title === '' && c.body === '')) return false;
    }
  }
  // Must look like our block markup at all (or be only grids).
  if (body.trim() !== '' && !/<(p|h3|ul)\b/i.test(body) && !grids.length) return false;
  // Strip the block/inline tags we understand, then check nothing structural is left.
  // The opening block tags may carry extra attributes (e.g. inline style) beyond
  // the required class — we ignore those so the field still converts to plain text.
  let rest = body
    .replace(/<p\b[^>]*\bclass="section-body"[^>]*>/gi, '')
    .replace(/<h3\b[^>]*\bclass="section-subhead"[^>]*>/gi, '')
    .replace(/<ul\b[^>]*\bclass="section-list"[^>]*>/gi, '')
    .replace(/<\/(p|h3|ul|li)>/gi, '')
    .replace(/<li>/gi, '')
    .replace(/<\/?(strong|em)>/gi, '');
  // Any remaining tag means there's markup we don't model → not convertible.
  return !/<[^>]+>/.test(rest);
}

function inlineHtmlToText(s) {
  return String(s)
    .replace(/<strong>(.*?)<\/strong>/gi, '**$1**')
    .replace(/<em>(.*?)<\/em>/gi, '*$1*')
    .replace(/&amp;/g, '&')
    .replace(/&lt;/g, '<')
    .replace(/&gt;/g, '>')
    .replace(/&quot;/g, '"');
}

function inlineTextToHtml(s) {
  // Escape the structural characters, then re-introduce the markup tokens.
  // Quotes are left as-is — they're valid in HTML text content and the
  // front-end markup uses literal " characters, so this keeps round-trips clean.
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(^|[^*])\*(?!\*)(.+?)\*(?!\*)/g, '$1<em>$2</em>');
}

// HTML → editor text. Caller must have checked isRichConvertible first.
// `fieldId` (optional) lets us cache minicard-grid structure so icons/styles
// survive the round-trip; pass it whenever the result will be edited & saved.
function htmlToEditText(html, fieldId) {
  let s = String(html);
  if (s.trim() === '') { if (fieldId) delete richGridCache[fieldId]; return ''; }

  // Lift minicard grids out first, replacing each with a unique marker so the
  // surrounding paragraphs/lists convert normally and grid order is preserved.
  const grids = findGrids(s);
  const gridTemplates = [];
  if (grids.length) {
    for (let i = grids.length - 1; i >= 0; i--) {
      const g = grids[i];
      const cards = parseCards(g.inner);
      gridTemplates[i] = { openTag: g.openTag, cards };
      s = s.slice(0, g.start) + '␀GRID' + i + '␀' + s.slice(g.end);
    }
  }
  if (fieldId) {
    if (gridTemplates.length) richGridCache[fieldId] = gridTemplates;
    else delete richGridCache[fieldId];
  }

  const blocks = [];
  const re = /<p\b[^>]*\bclass="section-body"[^>]*>([\s\S]*?)<\/p>|<h3\b[^>]*\bclass="section-subhead"[^>]*>([\s\S]*?)<\/h3>|<ul\b[^>]*\bclass="section-list"[^>]*>([\s\S]*?)<\/ul>|␀GRID(\d+)␀/gi;
  let m;
  while ((m = re.exec(s)) !== null) {
    if (m[1] !== undefined) {
      blocks.push(inlineHtmlToText(m[1].trim()));
    } else if (m[2] !== undefined) {
      blocks.push('## ' + inlineHtmlToText(m[2].trim()));
    } else if (m[3] !== undefined) {
      const items = [];
      const li = /<li>([\s\S]*?)<\/li>/gi;
      let lm;
      while ((lm = li.exec(m[3])) !== null) items.push('- ' + inlineHtmlToText(lm[1].trim()));
      if (items.length) blocks.push(items.join('\n'));
    } else if (m[4] !== undefined) {
      const tpl = gridTemplates[+m[4]];
      const lines = tpl.cards.map(c =>
        ':: ' + inlineHtmlToText(c.title) + ' | ' + inlineHtmlToText(c.body));
      blocks.push(lines.join('\n'));
    }
  }
  return blocks.join('\n\n');
}

// Rebuild one minicard-grid from the editor's ":: title | body" lines, reusing
// the cached template (grid opening tag, each card's icon + wrapper tags) so the
// layout is preserved byte-for-byte except the edited text. Extra lines beyond
// the template get plain cards; missing lines simply drop their card.
function cardLinesToGrid(cardLines, tpl) {
  const openTag = tpl ? tpl.openTag : '<div class="minicard-grid">';
  const cardsHtml = cardLines.map((line, i) => {
    const sep = line.indexOf('|');
    const title = sep === -1 ? line.trim() : line.slice(0, sep).trim();
    const body  = sep === -1 ? ''         : line.slice(sep + 1).trim();
    const t = tpl && tpl.cards[i] ? tpl.cards[i] : null;
    const cardOpen  = t ? t.openTag   : '<div class="minicard">';
    const icon      = t ? t.icon      : '';
    const titleOpen = t ? t.titleOpen : '<div class="mc-t">';
    const bodyOpen  = t ? t.bodyOpen  : '<div class="mc-b">';
    return cardOpen + (icon ? ' ' + icon + ' ' : ' ')
      + titleOpen + inlineTextToHtml(title) + '</div> '
      + bodyOpen  + inlineTextToHtml(body)  + '</div> </div>';
  }).join(' ');
  return openTag + ' ' + cardsHtml + ' </div>';
}

// Editor text → HTML, mirroring the front-end markup. `fieldId` (optional) is
// used to look up cached minicard-grid templates so icons/styles are preserved.
function editTextToHtml(text, fieldId) {
  const t = String(text).replace(/\r\n/g, '\n').trim();
  if (t === '') return '';
  const tpls = (fieldId && richGridCache[fieldId]) || [];
  let gridIdx = 0;
  const out = [];
  let listBuf = [];
  const flushList = () => {
    if (listBuf.length) {
      out.push('<ul class="section-list">' + listBuf.map(i => '<li>' + inlineTextToHtml(i) + '</li>').join('') + '</ul>');
      listBuf = [];
    }
  };
  t.split(/\n{2,}/).forEach(block => {
    const lines = block.split('\n').map(l => l.trim()).filter(l => l !== '');
    // A block made entirely of ":: " lines becomes a minicard grid.
    if (lines.length && lines.every(l => l.startsWith(':: '))) {
      flushList();
      const cardLines = lines.map(l => l.slice(3));
      out.push(cardLinesToGrid(cardLines, tpls[gridIdx++]));
      return;
    }
    // A block made entirely of "- " lines becomes a list.
    if (lines.length && lines.every(l => l.startsWith('- '))) {
      lines.forEach(l => listBuf.push(l.slice(2)));
      return;
    }
    flushList();
    lines.forEach(line => {
      if (line.startsWith('## ')) {
        out.push('<h3 class="section-subhead">' + inlineTextToHtml(line.slice(3)) + '</h3>');
      } else if (line.startsWith('- ')) {
        listBuf.push(line.slice(2));
      } else if (line.startsWith(':: ')) {
        out.push(cardLinesToGrid([line.slice(3)], tpls[gridIdx++]));
      } else {
        out.push('<p class="section-body">' + inlineTextToHtml(line) + '</p>');
      }
    });
    flushList();
  });
  flushList();
  return out.join('\n');
}

// Decide whether a given field should use text-editing for its current value.
function fieldUsesRichText(f, val) {
  return f.type === 'textarea' && isBodyFieldId(f.id) && isRichConvertible(val);
}

function switchEditTab(tab) {
  currentEditTab = tab;
  ['slide','content','assess'].forEach(t => {
    const el = document.getElementById('subtab-' + t);
    if (el) el.classList.toggle('active', t === tab);
  });
  renderEditFields();
}

function renderEditFields() {
  const def = CHAPTER_DEFS[currentChapterId];
  if (!def) return;
  const fields = currentEditTab === 'slide'   ? def.slideFields
               : currentEditTab === 'content' ? def.contentFields
               : def.assessFields;

  let html = '';
  let lastGroup = null;
  fields.forEach(f => {
    const val = draftData[f.id] !== undefined ? draftData[f.id]
              : liveData[f.id]  !== undefined ? liveData[f.id]
              : f.default;
    const group = f.group || null;
    if (group && group !== lastGroup) {
      html += `<div style="margin:${lastGroup === null ? '0' : '28px'} 0 14px;padding-bottom:8px;border-bottom:1px solid var(--border);">
        <span style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue-soft);">${escHtml(group)}</span>
      </div>`;
      lastGroup = group;
    }
    if (f.type === 'textarea') {
      const rich = fieldUsesRichText(f, val);
      const display = rich ? htmlToEditText(val, f.id) : val;
      const richAttr = rich ? ' data-rich="1"' : '';
      const hasGrid = rich && richGridCache[f.id];
      const gridHint = hasGrid ? ' · ":: Title | text" = a card in the grid' : '';
      const hint = rich ? `<div style="font-family:var(--mono);font-size:9px;color:var(--blue-soft);margin:-6px 0 8px;">Plain text · blank line = new paragraph · "## " = sub-heading · "- " = bullet · **bold**${gridHint}</div>` : '';
      html += `<div class="edit-field">
        <label class="edit-label" for="field-${f.id}">${f.label}</label>
        ${hint}
        <textarea class="edit-input" id="field-${f.id}"${richAttr} rows="4"
          placeholder="${escHtml(f.placeholder || '')}"
          oninput="scheduleDraftSave()" style="resize:vertical;min-height:80px;">${escHtml(display)}</textarea>
      </div>`;
    } else {
      html += `<div class="edit-field">
        <label class="edit-label" for="field-${f.id}">${f.label}</label>
        <input class="edit-input" id="field-${f.id}" type="text"
          value="${escHtml(val)}"
          placeholder="${escHtml(f.placeholder || '')}"
          oninput="scheduleDraftSave()" />
      </div>`;
    }
  });
  document.getElementById('edit-fields').innerHTML = html;
}

function scheduleDraftSave() {
  clearTimeout(debounceTimer);
  document.getElementById('draft-indicator').textContent = 'Saving draft…';
  debounceTimer = setTimeout(saveDraft, 500);
}

// Read a field's editor element back into storage format (HTML for rich
// body fields, raw value otherwise).
function readFieldValue(el) {
  const raw = el.value !== undefined ? el.value : el.textContent;
  if (!(el.getAttribute && el.getAttribute('data-rich') === '1')) return raw;
  // Editor element ids are "field-<fieldId>"; strip the prefix so editTextToHtml
  // can reuse the cached minicard-grid template for this field.
  const fieldId = el.id && el.id.indexOf('field-') === 0 ? el.id.slice(6) : undefined;
  return editTextToHtml(raw, fieldId);
}

async function saveDraft() {
  const def = CHAPTER_DEFS[currentChapterId];
  const data = {};
  [...def.slideFields, ...def.contentFields, ...def.assessFields].forEach(f => {
    const el = document.getElementById('field-' + f.id);
    if (el) data[f.id] = readFieldValue(el);
  });
  draftData = { ...draftData, ...data };
  data._draftStatus = 'pending';
  await db.collection('content-drafts').doc(currentChapterId).set(data, { merge: true });
  document.getElementById('draft-indicator').textContent = 'Draft saved ✓';
  updatePillStatus(currentChapterId, true, 'pending');
  updateSyncArea();
}

// fieldAccepted: null = pending, true = accepted, false = rejected
// changedFields: set of field ids that actually differ from live

let changedFields = new Set();

function showDiff() {
  const def = CHAPTER_DEFS[currentChapterId];
  fieldAccepted = {};
  changedFields = new Set();

  const currentDraft = {};
  [...def.slideFields, ...def.contentFields, ...def.assessFields].forEach(f => {
    const el = document.getElementById('field-' + f.id);
    if (el) currentDraft[f.id] = readFieldValue(el);
  });

  const rows = [...def.slideFields, ...def.contentFields, ...def.assessFields].map(f => {
    const live  = liveData[f.id]    !== undefined ? liveData[f.id]    : f.default;
    const draft = currentDraft[f.id] !== undefined ? currentDraft[f.id] : f.default;
    const changed = live !== draft;

    if (!changed) return '';

    fieldAccepted[f.id] = null; // pending — not yet decided
    changedFields.add(f.id);

    // Rich body fields are stored as HTML but shown/edited as plain text in
    // the review view too, to stay consistent with the editor.
    const rich = fieldUsesRichText(f, draft) || fieldUsesRichText(f, live);
    // Convert live without caching, then draft WITH caching last, so the cached
    // grid template reflects the draft — that's what the inline Edit box saves.
    const liveText  = rich ? htmlToEditText(live)      : live;
    const draftText = rich ? htmlToEditText(draft, f.id) : draft;
    const liveDisplay  = f.html ? live  : escHtml(liveText);
    const draftDisplay = f.html ? draft : escHtml(draftText);
    const richAttr = rich ? ' data-rich="1"' : '';
    return `<div class="diff-row" id="diff-row-${f.id}">
      <div class="diff-field-label">${escHtml(f.label)}</div>
      <div class="diff-old">
        <span style="font-family:var(--mono);font-size:8px;color:#c62828;letter-spacing:0.06em;display:block;margin-bottom:4px;">LIVE</span>
        ${liveDisplay}
      </div>
      <div class="diff-new">
        <span style="font-family:var(--mono);font-size:8px;color:#2e7d32;letter-spacing:0.06em;display:block;margin-bottom:4px;padding:8px 10px 0;">DRAFT
          <button class="diff-new-edit-btn" id="edit-btn-${f.id}" onclick="toggleDraftEdit('${f.id}')">Edit</button>
        </span>
        <span class="diff-new-text" id="draft-text-${f.id}">${draftDisplay}</span>
        <textarea class="diff-new-input" id="draft-input-${f.id}"${richAttr} oninput="onDraftInputChange('${f.id}')">${escHtml(draftText)}</textarea>
      </div>
      <div class="diff-actions">
        <button class="diff-accept" id="accept-${f.id}" onclick="toggleFieldAccept('${f.id}', true)">✓ Accept</button>
        <button class="diff-reject" id="reject-${f.id}" onclick="toggleFieldAccept('${f.id}', false)">✕ Reject</button>
      </div>
    </div>`;
  }).join('');

  // No actual changes — clear draft and return to editor
  if (changedFields.size === 0) {
    db.collection('content-drafts').doc(currentChapterId).delete();
    draftData = {};
    updatePillStatus(currentChapterId, false, null);
    updateSyncArea();
    return;
  }

  document.getElementById('diff-rows').innerHTML = rows;
  document.getElementById('diff-chapter-label').textContent = def.label;
  document.getElementById('sync-msg').textContent = '';
  document.getElementById('push-live-btn').disabled = true;
  document.getElementById('edit-editor-card').style.display = 'none';
  document.getElementById('diff-card').style.display = '';
}

function toggleDraftEdit(fieldId) {
  const textEl  = document.getElementById('draft-text-' + fieldId);
  const inputEl = document.getElementById('draft-input-' + fieldId);
  const btnEl   = document.getElementById('edit-btn-' + fieldId);
  const editing = inputEl.style.display === 'block';
  if (editing) {
    // save edit back. For rich body fields the textarea holds plain text,
    // so display it as text but compare/store as HTML.
    const isRich = inputEl.getAttribute('data-rich') === '1';
    const newVal = inputEl.value;
    textEl.textContent = newVal;
    textEl.style.display = 'block';
    inputEl.style.display = 'none';
    btnEl.textContent = 'Edit';
    // if field was already accepted, re-evaluate against live
    const live = liveData[fieldId] !== undefined ? liveData[fieldId] : '';
    const newStored = isRich ? editTextToHtml(newVal, fieldId) : newVal;
    if (newStored === live) {
      // no longer different — remove from changedFields
      changedFields.delete(fieldId);
      delete fieldAccepted[fieldId];
      const row = document.getElementById('diff-row-' + fieldId);
      if (row) row.style.display = 'none';
    }
    updatePushButton();
  } else {
    textEl.style.display = 'none';
    inputEl.style.display = 'block';
    inputEl.focus();
    btnEl.textContent = 'Done';
  }
}

function onDraftInputChange(fieldId) {
  // sync text preview live while editing
  const inputEl = document.getElementById('draft-input-' + fieldId);
  const textEl  = document.getElementById('draft-text-' + fieldId);
  if (textEl) textEl.textContent = inputEl.value;
}

function showEditorView() {
  document.getElementById('diff-card').style.display = 'none';
  document.getElementById('edit-editor-card').style.display = '';
  renderEditFields();
  updateSyncArea();
}

function toggleFieldAccept(fieldId, accept) {
  // If clicking the already-active state, deselect (back to pending)
  const current = fieldAccepted[fieldId];
  const newState = (current === accept) ? null : accept;
  fieldAccepted[fieldId] = newState;

  const row       = document.getElementById('diff-row-' + fieldId);
  const acceptBtn = document.getElementById('accept-' + fieldId);
  const rejectBtn = document.getElementById('reject-' + fieldId);
  if (!row) return;

  if (newState === false) {
    // Rejected — remove from draft immediately and hide the row
    delete draftData[fieldId];
    const remainingKeys = Object.keys(draftData);
    if (remainingKeys.length > 0) {
      const remaining = { _draftStatus: 'pending' };
      remainingKeys.forEach(k => { remaining[k] = draftData[k]; });
      db.collection('content-drafts').doc(currentChapterId).set(remaining);
      updatePillStatus(currentChapterId, true, 'pending');
    } else {
      db.collection('content-drafts').doc(currentChapterId).delete();
      updatePillStatus(currentChapterId, false, null);
    }
    row.style.display = 'none';
    // If all changed fields are now rejected (no visible rows), go back to editor
    const allDecided = [...changedFields].every(id => fieldAccepted[id] === false);
    if (allDecided) {
      draftData = {};
      showEditorView();
      return;
    }
    updatePushButton();
    return;
  }

  acceptBtn.classList.toggle('active', newState === true);
  rejectBtn.classList.toggle('active', newState === false);
  row.classList.remove('state-accepted', 'state-rejected');
  if (newState === true) row.classList.add('state-accepted');

  updatePushButton();
}

function updatePushButton() {
  // Push enabled as soon as at least one field is accepted — pending fields are simply skipped
  const anyAccepted = [...changedFields].some(id => fieldAccepted[id] === true);
  document.getElementById('push-live-btn').disabled = !anyAccepted;
}

function acceptAllFields() {
  changedFields.forEach(id => {
    if (fieldAccepted[id] !== true) toggleFieldAccept(id, true);
  });
}

function rejectAllFields() {
  changedFields.forEach(id => { fieldAccepted[id] = false; });
  draftData = {};
  db.collection('content-drafts').doc(currentChapterId).delete();
  updatePillStatus(currentChapterId, false, null);
  showEditorView();
}

async function pushLive() {
  const def = CHAPTER_DEFS[currentChapterId];
  const toWrite = {};
  const acceptedIds = new Set();
  const rejectedIds = new Set();

  [...def.slideFields, ...def.contentFields, ...def.assessFields].forEach(f => {
    if (fieldAccepted[f.id] === true) {
      const inputEl = document.getElementById('draft-input-' + f.id);
      const textEl  = document.getElementById('draft-text-' + f.id);
      const isRich  = inputEl && inputEl.getAttribute('data-rich') === '1';
      let val = (inputEl && inputEl.style.display === 'block') ? inputEl.value : (textEl ? textEl.textContent : (draftData[f.id] || ''));
      // Rich body fields are shown as text in the diff; store them back as HTML.
      if (isRich) val = editTextToHtml(val, f.id);
      toWrite[f.id] = val;
      acceptedIds.add(f.id);
    } else if (fieldAccepted[f.id] === false) {
      rejectedIds.add(f.id);
    }
  });

  const btn = document.getElementById('push-live-btn');
  btn.disabled = true;
  btn.textContent = 'Pushing…';

  await db.collection('content').doc(currentChapterId).set(toWrite, { merge: true });
  liveData = { ...liveData, ...toWrite };

  // Remove accepted + rejected from local draftData
  acceptedIds.forEach(k => delete draftData[k]);
  rejectedIds.forEach(k => delete draftData[k]);

  // Strip any remaining keys that are no longer different from live (stale entries)
  Object.keys(draftData).forEach(k => {
    if (liveData[k] === draftData[k]) delete draftData[k];
  });

  // If genuinely pending fields remain, rewrite draft doc; else delete entirely
  const remainingKeys = Object.keys(draftData);
  if (remainingKeys.length > 0) {
    const remaining = { _draftStatus: 'pending' };
    remainingKeys.forEach(k => { remaining[k] = draftData[k]; });
    await db.collection('content-drafts').doc(currentChapterId).set(remaining);
  } else {
    await db.collection('content-drafts').doc(currentChapterId).delete();
    draftData = {};
  }

  const now = new Date();
  const hhmm = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  document.getElementById('sync-msg').textContent = `Pushed live at ${hhmm} — accepted changes visible to all users.`;
  btn.textContent = 'Push to Live →';
  updatePillStatus(currentChapterId, remainingKeys.length > 0, remainingKeys.length > 0 ? 'pending' : null);
  setTimeout(showEditorView, 1600);
}
</script>
