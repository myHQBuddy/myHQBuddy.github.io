<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Portal — myHQ T&D</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Firebase v9 compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>

<style>
:root {
  --blue:      #1E22AA;
  --blue-mid:  #4A4FD4;
  --blue-soft: #7B7FE8;
  --blue-pale: #C7C9F5;
  --blue-wash: #f4f5fb;
  --white:     #FFFFFF;
  --border:    rgba(30,34,170,0.1);
  --sans:      'Manrope', system-ui, sans-serif;
  --mono:      'JetBrains Mono', ui-monospace, monospace;
  --ease:      cubic-bezier(0.22,1,0.36,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; }
body { font-family: var(--sans); background: var(--blue-wash); color: var(--blue); min-height: 100vh; }

/* ── Topbar ── */
.topbar {
  height: 56px; padding: 0 40px;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--white); border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
.topbar-rule { position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--blue); }
.brand-mark { height: 34px; }
.topbar-title { font-size: 13px; font-weight: 700; letter-spacing: 0.04em; color: var(--blue); }
.back-btn {
  font-size: 12px; font-weight: 600; color: var(--blue-soft); text-decoration: none;
  display: flex; align-items: center; gap: 6px;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--blue); }

/* ── Content ── */
.content { max-width: 860px; margin: 0 auto; padding: 40px 24px 80px; }

/* ── Tabs ── */
.tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 32px; }
.tab-btn {
  padding: 10px 22px; font-family: var(--sans); font-size: 12px; font-weight: 700;
  letter-spacing: 0.04em; border: none; background: none; cursor: pointer;
  color: var(--blue-soft); border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: color 0.15s;
}
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Cards ── */
.card { background: var(--white); border: 1px solid var(--border); padding: 24px; margin-bottom: 20px; }
.card-title {
  font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--blue-soft); margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.card-title::before { content: ''; width: 14px; height: 1px; background: var(--blue-soft); }

/* ── Search ── */
.search-row { display: flex; gap: 10px; }
.search-input {
  flex: 1; font-family: var(--sans); font-size: 13px; font-weight: 600;
  color: var(--blue); padding: 11px 14px;
  background: var(--blue-wash); border: 1px solid var(--border);
  outline: none; transition: border-color 0.18s;
}
.search-input:focus { border-color: var(--blue); background: var(--white); }
.search-input::placeholder { color: var(--blue-pale); font-weight: 500; }
.search-btn {
  padding: 11px 20px; font-family: var(--sans); font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--blue); color: var(--white); border: none; cursor: pointer;
  transition: background 0.15s;
}
.search-btn:hover { background: var(--blue-mid); }

/* ── User result card ── */
.user-result { display: none; margin-top: 16px; }
.user-result.visible { display: flex; align-items: center; gap: 16px; padding: 16px; background: var(--blue-wash); border: 1px solid var(--border); }
.user-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--blue); color: var(--white);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 800; flex-shrink: 0;
}
.user-info { flex: 1; }
.user-name { font-size: 14px; font-weight: 700; color: var(--blue); }
.user-email { font-size: 11px; color: var(--blue-soft); margin-top: 2px; font-family: var(--mono); }
.user-lastlogin { font-size: 10px; color: var(--blue-pale); margin-top: 3px; font-family: var(--mono); }
.user-admin-area { display: flex; align-items: center; gap: 10px; }
.admin-label { font-size: 11px; font-weight: 600; color: var(--blue-soft); }
.master-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 4px 10px; background: #e6f9e9; color: #2e7d32; border: 1px solid #BEE5C2;
}

/* Toggle switch */
.toggle-wrap { display: flex; align-items: center; gap: 8px; }
.toggle { position: relative; width: 40px; height: 22px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0; cursor: pointer;
  background: #e0e0e0; border-radius: 22px; transition: 0.3s;
}
.toggle-slider::before {
  content: ''; position: absolute; width: 16px; height: 16px; border-radius: 50%;
  left: 3px; bottom: 3px; background: white; transition: 0.3s;
}
.toggle input:checked + .toggle-slider { background: var(--blue); }
.toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

/* ── Course pills ── */
.course-pills { display: flex; gap: 8px; margin-bottom: 20px; }
.course-pill {
  padding: 8px 18px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; border: 1.5px solid var(--border); background: var(--white);
  color: var(--blue-soft); transition: background 0.15s, color 0.15s, border-color 0.15s;
}
.course-pill.active { background: var(--blue); color: var(--white); border-color: var(--blue); }

/* ── Chapter rows ── */
.chapter-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.chapter-row:last-child { border-bottom: none; }
.chapter-row.dimmed { opacity: 0.45; }
.chapter-name { font-size: 13px; font-weight: 700; color: var(--blue); }
.chapter-desc { font-size: 11px; color: var(--blue-soft); margin-top: 3px; font-family: var(--mono); }
.unlock-pill {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  padding: 5px 14px; cursor: pointer; border: none; transition: opacity 0.3s, background 0.15s;
}
.unlock-pill.unlocked { background: #BEE5C2; color: #2e7d32; }
.unlock-pill.locked   { background: #f0f0f0; color: #8B8FA8; }
.unlock-pill.na       { background: #f0f0f0; color: #8B8FA8; cursor: default; }
.unlock-pill.fade     { opacity: 0.4; }

.chapters-note {
  font-size: 10px; color: var(--blue-soft); margin-top: 14px;
  font-family: var(--mono); letter-spacing: 0.04em;
}

/* ── All users table ── */
.users-table { width: 100%; border-collapse: collapse; }
.users-table th {
  font-size: 9px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--blue-soft); padding: 10px 12px; text-align: left;
  border-bottom: 2px solid var(--border);
}
.users-table td {
  padding: 12px 12px; font-size: 12px; font-weight: 600; color: var(--blue);
  border-bottom: 1px solid var(--border); cursor: pointer;
}
.users-table tr:hover td { background: var(--blue-wash); }
.badge-admin {
  display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 3px 8px; background: var(--blue-wash); color: var(--blue-mid);
  border: 1px solid var(--blue-pale);
}
.badge-master {
  display: inline-block; font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 3px 8px; background: #e6f9e9; color: #2e7d32;
  border: 1px solid #BEE5C2;
}

/* ── Edit chapter tab ── */
.chapter-select {
  font-family: var(--sans); font-size: 13px; font-weight: 600; color: var(--blue);
  padding: 10px 14px; background: var(--white); border: 1px solid var(--border);
  outline: none; cursor: pointer; width: 100%; max-width: 320px; margin-bottom: 24px;
  appearance: none; -webkit-appearance: none;
}
.edit-subtab { padding:8px 18px; font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; background:none; border:none; border-bottom:2px solid transparent; color:var(--blue-soft); cursor:pointer; margin-bottom:-1px; }
.edit-subtab.active { color:var(--blue); border-bottom-color:var(--blue); }
.edit-field { margin-bottom: 18px; }
.edit-label {
  font-family: var(--mono); font-size: 9px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--blue-soft); margin-bottom: 6px; display: block;
}
.edit-input {
  width: 100%; font-family: var(--sans); font-size: 13px; font-weight: 600;
  color: var(--blue); padding: 11px 14px; background: var(--blue-wash);
  border: 1px solid var(--border); outline: none; transition: border-color 0.18s;
}
.edit-input:focus { border-color: var(--blue); background: var(--white); }
.draft-indicator {
  font-size: 10px; color: #2e7d32; font-family: var(--mono); letter-spacing: 0.06em;
  margin-bottom: 16px; min-height: 16px; transition: opacity 0.3s;
}
.sync-btn {
  padding: 12px 24px; font-family: var(--sans); font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--blue); color: var(--white); border: none; cursor: pointer;
  transition: background 0.15s; margin-top: 8px;
}
.sync-btn:hover { background: var(--blue-mid); }
.sync-msg {
  font-size: 11px; color: var(--blue-mid); font-family: var(--mono);
  margin-top: 10px; min-height: 18px; letter-spacing: 0.04em;
}
.diff-row {
  padding: 14px 0; border-bottom: 1px solid var(--border);
  display: grid; grid-template-columns: 120px 1fr 1fr auto; gap: 12px; align-items: start;
  transition: opacity 0.2s;
}
.diff-row:last-child { border-bottom: none; }
.diff-row.state-accepted { background: #f4fbf5; }
.diff-row.state-rejected { opacity: 0.45; }
.diff-field-label { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue-soft); padding-top: 6px; }
.diff-old { font-size: 12px; color: #c62828; background: #fff5f5; padding: 8px 10px; border-left: 3px solid #f44336; line-height: 1.5; }
.diff-new { font-size: 12px; color: #2e7d32; background: #f1f8f1; padding: 0; border-left: 3px solid #4caf50; line-height: 1.5; position: relative; }
.diff-new-text { padding: 8px 10px; display: block; }
.diff-new-input { display: none; width: 100%; font-family: var(--sans); font-size: 12px; color: #1b5e20; background: #f1f8f1; border: none; border-top: 1px dashed #4caf50; padding: 6px 10px; resize: vertical; min-height: 36px; outline: none; }
.diff-new-edit-btn { position: absolute; top: 4px; right: 6px; font-size: 8px; font-family: var(--mono); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #2e7d32; background: none; border: none; cursor: pointer; text-decoration: underline; padding: 0; }
.diff-same { font-size: 12px; color: var(--blue-soft); padding: 6px 10px; font-style: italic; grid-column: 2 / 4; }
.diff-actions { display: flex; flex-direction: column; gap: 6px; padding-top: 2px; }
.diff-accept { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 10px; background: #e6f9e9; color: #2e7d32; border: 1px solid #BEE5C2; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.diff-accept.active { background: #2e7d32; color: #fff; border-color: #2e7d32; }
.diff-reject { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 5px 10px; background: #fff5f5; color: #c62828; border: 1px solid #ffcdd2; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
.diff-reject.active { background: #c62828; color: #fff; border-color: #c62828; }
.diff-push-btn { padding: 13px 28px; font-family: var(--sans); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; background: var(--blue); color: #fff; border: none; cursor: pointer; transition: background 0.15s, opacity 0.15s; }
.diff-push-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.chapter-pill {
  padding: 8px 16px; font-size: 12px; font-weight: 700;
  border: 1.5px solid var(--border); background: var(--white);
  color: var(--blue-soft); cursor: pointer; transition: all 0.15s;
}
.chapter-pill.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
.chapter-pill:disabled { opacity: 0.4; cursor: default; }
.pill-wrap { display: inline-flex; flex-direction: column; align-items: flex-start; gap: 4px; }
.chapter-section { display: flex; flex-direction: column; gap: 10px; }
.chapter-section-label {
  font-family: var(--mono); font-size: 9px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue-soft);
}
.chapter-section-pills { display: flex; flex-wrap: wrap; gap: 8px; }
.chapter-pill.has-pending { border-color: #f59e0b; color: #92400e; background: #fffbeb; }
.chapter-pill.has-pending.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
.course-pill.has-pending { border-color: #f59e0b; color: #92400e; }
.course-pill.has-pending.active { background: var(--blue); color: var(--white); border-color: var(--blue); }
.pill-callout {
  font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; padding: 2px 7px; border-radius: 2px;
}
.pill-callout.status-pending { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-rule"></div>
  <img src="logo_landing_hub/myHQ_logo_landing.png" alt="myHQ" class="brand-mark">
  <span class="topbar-title">Admin Portal</span>
  <a href="hub.html" class="back-btn">← Back to Hub</a>
</div>

<div class="content">

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('access')">Logins &amp; Access</button>
    <button class="tab-btn" onclick="switchTab('edit')">Edit Chapter</button>
  </div>

  <!-- TAB 1: LOGINS & ACCESS -->
  <div class="tab-panel active" id="tab-access">

    <!-- User search -->
    <div class="card">
      <div class="card-title">Find User</div>
      <div class="search-row">
        <input class="search-input" id="search-input" type="email" placeholder="user@myhq.in" />
        <button class="search-btn" onclick="searchUser()">Search</button>
      </div>
      <div class="user-result" id="user-result">
        <div class="user-avatar" id="result-avatar"></div>
        <div class="user-info">
          <div class="user-name" id="result-name"></div>
          <div class="user-email" id="result-email"></div>
          <div class="user-lastlogin" id="result-lastlogin"></div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:10px;">
          <div class="user-admin-area" id="result-admin-area"></div>
          <button onclick="clearSearch()" style="background:none;border:none;font-family:var(--mono);font-size:9px;font-weight:600;color:var(--blue-soft);cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;padding:0;text-decoration:underline;">✕ Clear</button>
        </div>
      </div>
    </div>

    <!-- Course pill selector -->
    <div class="card" id="unlock-card" style="display:none;">
      <div class="card-title">Select Course</div>
      <div class="course-pills">
        <button class="course-pill active" onclick="selectCourse('beginner',this)">01 Beginner</button>
        <button class="course-pill" onclick="selectCourse('intermediate',this)">02 Intermediate</button>
        <button class="course-pill" onclick="selectCourse('advanced',this)">03 Advanced</button>
      </div>
      <div id="chapter-list"></div>
      <div class="chapters-note">⚡ Click Unlocked / Locked to toggle. Updates in real-time — no Save button.</div>
    </div>

    <!-- All users list -->
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span>All Users</span>
        <span id="users-count" style="font-family:var(--mono);font-size:9px;font-weight:600;color:var(--blue-pale);letter-spacing:0.08em;"></span>
      </div>
      <table class="users-table">
        <thead>
          <tr>
            <th>Name</th><th>Email</th><th>Last Login</th><th>Role</th>
          </tr>
        </thead>
        <tbody id="users-tbody"></tbody>
      </table>
      <!-- Collapsed footer -->
      <div id="users-footer" style="display:none;padding:12px 0 0;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);margin-top:8px;">
        <button id="show-all-btn" onclick="toggleShowAll()" style="background:none;border:none;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue);cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;padding:0;text-decoration:underline;"></button>
        <div id="pagination-controls" style="display:none;align-items:center;gap:8px;">
          <button onclick="changePage(-1)" style="background:none;border:1px solid var(--border);font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue-soft);cursor:pointer;padding:4px 10px;letter-spacing:0.06em;">← Prev</button>
          <span id="page-indicator" style="font-family:var(--mono);font-size:9px;font-weight:600;color:var(--blue-soft);letter-spacing:0.06em;"></span>
          <button onclick="changePage(1)" style="background:none;border:1px solid var(--border);font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue-soft);cursor:pointer;padding:4px 10px;letter-spacing:0.06em;">Next →</button>
        </div>
      </div>
    </div>

  </div>

  <!-- TAB 2: EDIT CHAPTER -->
  <div class="tab-panel" id="tab-edit">

    <!-- Step 1: Course picker -->
    <div class="card">
      <div class="card-title">Select Course</div>
      <div class="course-pills" id="edit-course-pills"></div>
    </div>

    <!-- Step 2: Chapter picker -->
    <div class="card" id="edit-chapter-card">
      <div class="card-title">Select Chapter</div>
      <div id="edit-chapter-pills" style="display:flex;flex-direction:column;gap:20px;"></div>
    </div>

    <!-- Step 3a: Editor view -->
    <div class="card" id="edit-editor-card" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div class="card-title" style="margin-bottom:0;" id="edit-chapter-label"></div>
        <div class="draft-indicator" id="draft-indicator"></div>
      </div>
      <div id="edit-subtabs" style="display:flex;gap:0;margin-bottom:20px;border-bottom:1px solid var(--border);">
        <button class="edit-subtab active" id="subtab-slide" onclick="switchEditTab('slide')">Slide Content</button>
        <button class="edit-subtab" id="subtab-content" onclick="switchEditTab('content')">Chapter Content</button>
        <button class="edit-subtab" id="subtab-assess" onclick="switchEditTab('assess')">Assessment</button>
      </div>
      <div id="edit-fields"></div>
      <div id="sync-area" style="margin-top:16px;"></div>
    </div>

    <!-- Step 3b: Diff / review view (masterAdmin only) -->
    <div class="card" id="diff-card" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div class="card-title" style="margin-bottom:0;">Review Changes — <span id="diff-chapter-label" style="color:var(--blue-mid);"></span></div>
        <button onclick="showEditorView()" style="background:none;border:none;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--blue-soft);cursor:pointer;letter-spacing:0.08em;text-transform:uppercase;text-decoration:underline;">← Back to Edit</button>
      </div>
      <div id="diff-rows"></div>
      <div style="display:flex;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);align-items:center;flex-wrap:wrap;">
        <button onclick="acceptAllFields()" style="padding:10px 20px;font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:#e6f9e9;color:#2e7d32;border:1px solid #BEE5C2;cursor:pointer;">✓ Accept All</button>
        <button onclick="rejectAllFields()" style="padding:10px 20px;font-family:var(--sans);font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;background:#fff5f5;color:#c62828;border:1px solid #ffcdd2;cursor:pointer;">✕ Reject All</button>
        <div style="flex:1;"></div>
        <button class="diff-push-btn" id="push-live-btn" onclick="pushLive()" disabled>Push to Live →</button>
      </div>
      <div class="sync-msg" id="sync-msg"></div>
    </div>

  </div>

</div>

<script>
const db   = window.firebaseDB;
const auth = window.firebaseAuth;

let currentUser    = null;
let currentUserDoc = null;
let selectedCourse = 'beginner';
let isMasterAdmin  = false;

const CHAPTER_DEFS = {
  ch1: {
    label: 'Where We Play',
    course: 'beginner',
    slideFields: [

    contentFields: [
      { id: 'ch1-s01-title',    label: 'Title',           type: 'input',    group: 'S01 — Indian Real Estate: The Big Picture', default: 'Indian Real Estate: The Big Picture' },
      { id: 'ch1-s01-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S01 — Indian Real Estate: The Big Picture', default: "The scale of India's real estate market — its size, its growth drivers, and why office space sits at its centre." },
      { id: 'ch1-s01-body',     label: 'Body',            type: 'textarea', group: 'S01 — Indian Real Estate: The Big Picture', default: "India's real estate sector is the third largest in the world by value, after only the US and China. Every developer, operator, advisor, and platform here is playing in a global arena. The sector contributes 7% of India's GDP today, roughly $210 billion, with that share projected to reach 13% by 2030.\n\nIt is also one of India's biggest employers. Real estate and construction together support over 70 million jobs, second only to agriculture. 1 in 10 non-farm workers in India earns a living from this sector. By 2030, the market is on track to cross $1 trillion in value, driven by urbanisation, business formalisation, and India's rise as a global hub. These are structural shifts. They do not reverse.\n\nWithin this sector, real estate splits into two distinct worlds: residential and commercial. Residential is where people live. Commercial is where business happens. The two operate on different logic, different cycles, and different stakeholders." },
      { id: 'ch1-s01-takeaway', label: 'Takeaway',        type: 'input',    group: 'S01 — Indian Real Estate: The Big Picture', default: '"We shape our buildings; thereafter they shape us." — Winston Churchill' },
      { id: 'ch1-s02-title',    label: 'Title',           type: 'input',    group: 'S02 — Residential vs Commercial', default: 'Residential vs Commercial' },
      { id: 'ch1-s02-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S02 — Residential vs Commercial', default: 'The difference between residential and commercial real estate, and why they behave like separate industries.' },
      { id: 'ch1-s02-body',     label: 'Body',            type: 'textarea', group: 'S02 — Residential vs Commercial', default: "Real estate is one term, but it represents two fundamentally different markets.\n\nResidential real estate is deeply personal. People buy homes to build a life, provide security for their families, improve their lifestyle, and create a place they can call their own. For most families, purchasing a home is one of the largest emotional and financial decisions they will ever make. It is driven as much by aspiration and sentiment as it is by economics.\n\nCommercial real estate, by contrast, is driven by business needs. Companies require land and infrastructure to build products, deliver services, hire talent, serve customers, and generate economic activity.\n\nThis distinction matters because the two markets operate differently. A family may spend years planning the purchase of a home and make that decision only once or twice in a lifetime. Businesses, however, evaluate real estate through a structured lens — assessing location, cost, customer access, talent availability, operational efficiency, and scalability.\n\nResidential real estate is about where people live. Commercial real estate is about where economic activity happens. One fulfills personal aspirations; the other powers business growth, employment, investment, and economic development." },
      { id: 'ch1-s02-takeaway', label: 'Takeaway',        type: 'input',    group: 'S02 — Residential vs Commercial', default: 'Residential sells dreams. Commercial solves problems.' },
      { id: 'ch1-s03-title',    label: 'Title',           type: 'input',    group: 'S03 — Commercial Real Estate (CRE)', default: 'Commercial Real Estate (CRE)' },
      { id: 'ch1-s03-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S03 — Commercial Real Estate (CRE)', default: 'Understand the major segments of commercial real estate, the key stakeholders involved, and the broader ecosystem that supports the industry.' },
      { id: 'ch1-s03-body',     label: 'Body',            type: 'textarea', group: 'S03 — Commercial Real Estate (CRE)', default: "Commercial Real Estate (CRE) refers to properties used for business, commercial, industrial, institutional, or income-generating activities. It forms the physical infrastructure that enables economic activity and business growth.\n\nCommercial real estate is the physical infrastructure that makes economic activity possible — the offices where deals get closed, the warehouses where goods get dispatched, the campuses where 10,000 employees show up on Monday morning.\n\nCRE covers a lot of ground. Grade A office towers in BKC. Last-mile logistics parks outside Pune. Retail high streets in Connaught Place. Industrial corridors along the Delhi-Mumbai Expressway.\n\nCRE is not a monolith. It's a system — of developers who build, operators who run, occupiers who lease, and investors who hold." },
      { id: 'ch1-s04-title',    label: 'Title',           type: 'input',    group: 'S04 — Office Leasing: Conventional vs Flex', default: 'Office Leasing: Conventional vs Flex' },
      { id: 'ch1-s04-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S04 — Office Leasing: Conventional vs Flex', default: 'The two routes through which companies get office space, and how each journey unfolds.' },
      { id: 'ch1-s04-body',     label: 'Body',            type: 'textarea', group: 'S04 — Office Leasing: Conventional vs Flex', default: "Within office real estate, companies today have two primary ways to occupy space: conventional leasing and flex leasing.\n\nConventional leasing is the traditional model. A company leases space directly from a developer or landlord, signs a long-term lease, mostly invests in fit-outs and furniture, manages facility operations, and takes responsibility for running the office. This approach offers maximum customization and control but requires significant capital investment, longer setup timelines, and multi-year commitments.\n\nFlex leasing follows a different model. Instead of dealing directly with the building owner, the company leases space from a flexible workspace operator that has already designed, furnished, and operationalized the office. The operator manages infrastructure, amenities, maintenance, and day-to-day operations, allowing the occupier to move in and become operational almost immediately." },
      { id: 'ch1-s04-takeaway', label: 'Takeaway',        type: 'input',    group: 'S04 — Office Leasing: Conventional vs Flex', default: 'Conventional and flex are two distinct ecosystems — same buildings, fundamentally different journeys for the occupier.' },
      { id: 'ch1-s05-title',    label: 'Title',           type: 'input',    group: 'S05 — Key Stakeholders in Office Leasing', default: 'Key Stakeholders in Office Leasing' },
      { id: 'ch1-s05-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S05 — Key Stakeholders in Office Leasing', default: 'Players in the Office Leasing Ecosystem and Their Value Addition Across the Leasing Funnel.' },
      { id: 'ch1-s05-body',     label: 'Body',            type: 'textarea', group: 'S05 — Key Stakeholders in Office Leasing', default: "Office leasing is not a single transaction but a coordinated process involving multiple participants. From creating office inventory and sourcing options to negotiating leases, executing fit-outs, and managing workplace operations, different stakeholders play specialized roles. Developers, occupiers, brokers, operators, consultants, legal advisors, and service providers work together to deliver a functional workplace solution." },
      { id: 'ch1-s05-takeaway', label: 'Takeaway',        type: 'input',    group: 'S05 — Key Stakeholders in Office Leasing', default: 'Understanding all five players — and what each one adds — is what separates a transaction executor from a trusted advisor.' },
      { id: 'ch1-s06-title',    label: 'Title',           type: 'input',    group: 'S06 — Where myHQ Fits', default: 'Where myHQ Fits' },
      { id: 'ch1-s06-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S06 — Where myHQ Fits', default: "What myHQ does, where it sits in the market, and what makes its model distinctive." },
      { id: 'ch1-s06-body',     label: 'Body',            type: 'textarea', group: 'S06 — Where myHQ Fits', default: "Every office leasing transaction typically involves two important intermediaries: a platform that enables digital search and discovery, and a consultant who guides the client through the transaction process.\n\nConsultants (IPCs and DPCs) bring market knowledge, relationships, transaction expertise, and negotiation capability. They help occupiers evaluate options, benchmark commercial terms, and navigate complex lease negotiations. However, their discovery process is primarily offline and relationship-driven.\n\nListing Platforms solve the digital search and discovery problem by aggregating available options in one place. They provide transparency, scale, and self-service access to the market. However, they typically offer limited advisory support.\n\nmyHQ combines both models. It brings together the scale and transparency of a digital marketplace with the expertise of a leasing consultant. Clients benefit from broad market visibility while also receiving guidance on requirement assessment, space shortlisting, site evaluations, commercial negotiations, and deal closure." },
      { id: 'ch1-s07-title',    label: 'Title',           type: 'input',    group: 'S07 — Market Data', default: 'Market Data' },
      { id: 'ch1-s07-body',     label: 'Body',            type: 'textarea', group: 'S07 — Market Data', default: "Key market metrics for reference. These numbers give you credibility in client conversations and help you understand the scale of the opportunity." },
      { id: 'ch1-s08-title',    label: 'Title',           type: 'input',    group: 'S08 — The 2030 View', default: 'The 2030 View' },
      { id: 'ch1-s08-body',     label: 'Body',            type: 'textarea', group: 'S08 — The 2030 View', default: "India's office market is built on strong structural foundations — and most of them point in the same direction: toward flexibility." },
    ],
    assessFields: [
      { id: 'ch1-assess-q1', label: 'Question 1', type: 'textarea', default: 'Compare Commercial Real Estate (CRE) and Residential Real Estate across factors such as supply, demand, user personas, decision-making, emotional drivers, investment objectives, transaction processes, and market dynamics. What are the key similarities and differences?' },

      { id: 'ch2-sl7-s7-lbl',     label: 'Stat 7 Label',           type: 'input',    group: 'Slide 7 — Scale & Reach Stats', default: 'Working with corporates for all their needs' },

      { id: 'ch2-sl7-s9-num',     label: 'Stat 9 Number',          type: 'input',    group: 'Slide 7 — Scale & Reach Stats', default: '5L+ Downloads' },
      { id: 'ch2-sl7-s9-lbl',     label: 'Stat 9 Label',           type: 'input',    group: 'Slide 7 — Scale & Reach Stats', default: 'For hybrid companies & end users' },
      { id: 'ch2-sl7-s10-num',    label: 'Stat 10 Number',         type: 'input',    group: 'Slide 7 — Scale & Reach Stats', default: '2.5M+ Traffic' },
      { id: 'ch2-sl7-s10-lbl',    label: 'Stat 10 Label',          type: 'input',    group: 'Slide 7 — Scale & Reach Stats', default: 'On Website (Annually)' },
      { id: 'ch2-sl8-headline',   label: 'Ambition Headline',      type: 'input',    group: 'Slide 8 — Ambition 2030', default: 'Ambition 2030: ₹5,000 Cr worth of Transactions, ₹500 Cr of Revenue & a global powerhouse' },
      { id: 'ch2-sl8-sub',        label: 'Sub-heading',            type: 'input',    group: 'Slide 8 — Ambition 2030', default: 'We have grown 35X in the last 3 years and plan to grow 10X more in the next 5' },
    ],
    contentFields: [
      { id: 'ch2-intro-body',   label: 'Body',            type: 'textarea', group: 'Intro', default: "This chapter helps you understand the story behind myHQ and maps the company — where it came from, who built it, how it's organized, and where it's headed. It is the story of a dream, a vision, and a journey of building something meaningful from the ground up.\n\nmyHQ started with a simple question asked in Bangalore traffic in 2015. Today, it has grown into one of India's fastest-growing commercial real estate platforms, serving 50,000+ clients, facilitating ₹500 Cr+ in annual GMV, and pursuing an ambitious goal of ₹5,000 Cr in transactions by 2030.\n\nThe journey from a friend's café to an emerging international platform is more than a company story — it reflects the ambition, resilience, and long-term vision that continue to shape the future of workspaces and commercial real estate." },
      { id: 'ch2-s01-title',    label: 'Title',           type: 'input',    group: 'S01 — The Story', default: 'The Story' },
      { id: 'ch2-s01-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S01 — The Story', default: "Understand every phase of myHQ's journey — the bets, the turning points, and what shaped the company it is today." },
      { id: 'ch2-s01-body',     label: 'Body',            type: 'textarea', group: 'S01 — The Story', default: "myHQ didn't start with a funding announcement or a grand plan. It started with a question asked in a Delhi NCR café in 2015 — and a friend's empty chairs that no one was using. What followed was ten years of building, breaking, rebuilding, and refusing to quit. This is that story." },
      { id: 'ch2-tl1-year',  label: 'Entry 1 Year',  type: 'input',    group: 'S01 — Timeline Entries', default: '2015 · Phase 1 begins' },
      { id: 'ch2-tl1-title', label: 'Entry 1 Title', type: 'input',    group: 'S01 — Timeline Entries', default: "One question. Why can't people work from wherever they want?" },
      { id: 'ch2-tl1-body',  label: 'Entry 1 Body',  type: 'textarea', group: 'S01 — Timeline Entries', default: "Utkarsh Kawatra and Vinayak Aggarwal were IIT Delhi Alumni who'd gone their separate ways — Utkarsh to Helion Ventures, Vinayak to Goldman Sachs. They ended up back in NCR at the same time, frustrated by the same thing: good professionals wasting hours commuting to offices they didn't need to be in. The question wasn't complicated. The answer would take a decade to build." },
      { id: 'ch2-tl2-year',  label: 'Entry 2 Year',  type: 'input',    group: 'S01 — Timeline Entries', default: 'Apr 2016 · Founded' },
      { id: 'ch2-tl2-title', label: 'Entry 2 Title', type: 'input',    group: 'S01 — Timeline Entries', default: "A friend's café. Empty chairs every morning. That became the first supply on the platform." },
      { id: 'ch2-tl2-body',  label: 'Entry 2 Body',  type: 'textarea', group: 'S01 — Timeline Entries', default: "A friend ran a café that stayed empty before noon — chairs up, tables empty, burning rent before the evening rush. Utkarsh and Vinayak saw something no one else was seeing: <strong>idle real estate is wasted potential.</strong> They started converting cafés and lounges into long-hour working spaces — WiFi, free coffee, discounted menus. Show up, work, leave. No deposit, no commitment. myHQ was born." },
      { id: 'ch2-tl3-year',  label: 'Entry 3 Year',  type: 'input',    group: 'S01 — Timeline Entries', default: '2016–17 · Proof of Concept' },
      { id: 'ch2-tl3-title', label: 'Entry 3 Title', type: 'input',    group: 'S01 — Timeline Entries', default: '100+ bookings a day. 20+ cafés. Startups were hooked.' },
      { id: 'ch2-tl3-body',  label: 'Entry 3 Body',  type: 'textarea', group: 'S01 — Timeline Entries', default: 'Startups and freelancers loved the model — no lock-in, no security deposit, just show up and get to work. Word spread fast. Within months, myHQ was clocking 100+ daily bookings across 20+ cafés in NCR. The idea worked. Now it needed capital to grow.' },
      { id: 'ch2-tl4-year',  label: 'Entry 4 Year',  type: 'input',    group: 'S01 — Timeline Entries', default: '2017 · Angel Round' },
      { id: 'ch2-tl4-title', label: 'Entry 4 Title', type: 'input',    group: 'S01 — Timeline Entries', default: 'Founder-to-founder belief. First outside capital raised.' },
      { id: 'ch2-tl4-body',  label: 'Entry 4 Body',  type: 'textarea', group: 'S01 — Timeline Entries', default: 'Neeraj Singh was building Spinny. Ashneer Grover was about to start BharatPe. They backed myHQ because they recognised the zero-to-one pattern. VCs were still debating whether coworking was a real category. Operators already knew.' },
      { id: 'ch2-tl5-year',  label: 'Entry 5 Year',  type: 'input',    group: 'S01 — Timeline Entries', default: '2018 · Phase 2 begins' },
      { id: 'ch2-tl5-title', label: 'Entry 5 Title', type: 'input',    group: 'S01 — Timeline Entries', default: 'Businesses started asking for dedicated space. Assisted Marketplace was born.' },
      { id: 'ch2-tl5-body',  label: 'Entry 5 Body',  type: 'textarea', group: 'S01 — Timeline Entries', default: 'The On Demand product was growing — but businesses using the platform were asking for something more. They needed dedicated, long-term workspace. myHQ built it: Assisted Marketplace, a platform-led advisory for businesses finding office space. Over 100 coworking spaces were onboarded. A new product category was live.' },
      { id: 'ch2-tl6-year',  label: 'Entry 6 Year',  type: 'input',    group: 'S01 — Timeline Entries', default: '2019 · Three products taking shape' },
      { id: 'ch2-tl6-title', label: 'Entry 6 Title', type: 'input',    group: 'S01 — Timeline Entries', default: 'Virtual Office launched from a Shopify store. Series A followed.' },
      { id: 'ch2-tl6-body',  label: 'Entry 6 Body',  type: 'textarea', group: 'S01 — Timeline Entries', default: 'Businesses needed more than a desk — they needed an address for office & GST registration. myHQ launched Virtual Office, initially from a Shopify website. It was scrappy, but it worked. Three products were now live — On Demand, Assisted Marketplace, Virtual Office — and India Quotient backed the platform with a Series A.' },
      { id: 'ch2-tl7-year',  label: 'Entry 7 Year',  type: 'input',    group: 'S01 — Timeline Entries', default: '2020 · COVID' },
      { id: 'ch2-tl7-title', label: 'Entry 7 Title', type: 'input',    group: 'S01 — Timeline Entries', default: 'Offices shut overnight. The business went dark. Buyout offers came in. They said no to every one.' },
      { id: 'ch2-tl7-body',  label: 'Entry 7 Body',  type: 'textarea', group: 'S01 — Timeline Entries', default: "COVID didn't ease myHQ into a downturn — it turned the lights off. Overnight. Revenue dropped. The future looked bleak. Multiple acquirers came with buyout offers. <strong>The founders turned every single one down.</strong> They believed in what they were building. They were waiting for the right partner — not a distressed exit." },
      { id: 'ch2-tl8-year',  label: 'Entry 8 Year',  type: 'input',    group: 'S01 — Timeline Entries', default: '2022 · Phase 3 begins' },
      { id: 'ch2-tl8-title', label: 'Entry 8 Title', type: 'input',    group: 'S01 — Timeline Entries', default: 'Powered by ANAROCK. Brand stays. Founders stay. Mission stays.' },
      { id: 'ch2-tl8-body',  label: 'Entry 8 Body',  type: 'textarea', group: 'S01 — Timeline Entries', default: "Recognizing myHQ's strong technology foundation and scalable business model, ANAROCK became a strategic investor. This wasn't a rescue. It was the right fit. ANAROCK understood commercial real estate at the deepest level, and they wanted myHQ to keep operating as myHQ. The brand was retained. The founders stayed on board. The business verticals were now fully live across metro cities, backed by institutional credibility that opened enterprise doors that hadn't been reachable before." },
      { id: 'ch2-tl9-year',  label: 'Entry 9 Year',  type: 'input',    group: 'S01 — Timeline Entries', default: '2024 · WeWork Partnership & Investment' },
      { id: 'ch2-tl9-title', label: 'Entry 9 Title', type: 'input',    group: 'S01 — Timeline Entries', default: "myHQ becomes WeWork India's exclusive tech, marketing & distribution partner." },
      { id: 'ch2-tl9-body',  label: 'Entry 9 Body',  type: 'textarea', group: 'S01 — Timeline Entries', default: 'WeWork invested in myHQ, making it WeWork India\'s exclusive partner for On Demand and Virtual Office products. The power of India\'s largest flex operator combined with myHQ\'s platform. A partnership that added significant inventory and institutional scale overnight.' },
      { id: 'ch2-tl10-year',  label: 'Entry 10 Year',  type: 'input',    group: 'S01 — Timeline Entries', default: '2025–26 · Going global' },
      { id: 'ch2-tl10-title', label: 'Entry 10 Title', type: 'input',    group: 'S01 — Timeline Entries', default: 'Virtual Office in Dubai. Assisted Marketplace in London. Same model. New geographies.' },
      { id: 'ch2-tl10-body',  label: 'Entry 10 Body',  type: 'textarea', group: 'S01 — Timeline Entries', default: 'myHQ is now beyond India. Virtual Office launched in Dubai. Assisted Marketplace is expanding into London. The same operator-agnostic, platform-led model that worked in Delhi NCR is now being applied internationally through myhqspaces.com. The ambition is no longer domestic — it\'s global.' },
      { id: 'ch2-tl11-year',  label: 'Entry 11 Year',  type: 'input',    group: 'S01 — Timeline Entries', default: '2030 · The target' },
      { id: 'ch2-tl11-title', label: 'Entry 11 Title', type: 'input',    group: 'S01 — Timeline Entries', default: '35X in 3 years. 10X more by 2030. ₹5,000 Cr in transactions.' },
      { id: 'ch2-tl11-body',  label: 'Entry 11 Body',  type: 'textarea', group: 'S01 — Timeline Entries', default: 'From ₹20 Cr in FY22 to ₹1,200 Cr in FY26 — that\'s 35X in three years. The next chapter ends at ₹5,000 Cr in transactions and ₹500 Cr in revenue by FY30. Same platform. Same mission. The market for flexible commercial real estate in India alone is massive — and myHQ has barely scratched the surface of it.' },
      { id: 'ch2-s02-title',    label: 'Title',           type: 'input',    group: 'S02 — Business Verticals', default: 'Business Verticals' },
      { id: 'ch2-s02-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S02 — Business Verticals', default: "What myHQ's business verticals do, who they serve, and how they work together." },
      { id: 'ch2-s02-body',     label: 'Body (Intro)',    type: 'textarea', group: 'S02 — Business Verticals', default: 'myHQ operates three distinct business lines under one platform. Each vertical serves a different customer need, runs its own PnL, and has its own leadership. They share infrastructure, brand, and operator relationships — but each is a standalone product with its own market.' },
      { id: 'ch2-s02-body2',    label: 'Body (Closing)',  type: 'textarea', group: 'S02 — Business Verticals', default: 'myHQ offices are present across Bengaluru, Gurugram, New Delhi, Noida, Hyderabad, Chennai, Pune and Ahmedabad. All business verticals share the same platform, operator network, and brand — which means every transaction in one vertical strengthens the others.' },
      { id: 'ch2-s03-title',    label: 'Title',           type: 'input',    group: 'S03 — Leadership Team', default: 'An entrepreneurial team using tech to disrupt commercial real estate.' },
      { id: 'ch2-s03-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S03 — Leadership Team', default: 'Who leads myHQ, what they did before, and why the team composition matters.' },
      { id: 'ch2-s03-body',     label: 'Body',            type: 'textarea', group: 'S03 — Leadership Team', default: "myHQ is led by two IIT Delhi founders backed by a team of operators who've built and scaled businesses before. Every business head has domain depth." },
      { id: 'ch2-s04-title',    label: 'Title',           type: 'input',    group: 'S04 — Org Structure', default: 'Org Structure' },
      { id: 'ch2-s04-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S04 — Org Structure', default: "How myHQ's departments, sub-teams, and functions connect to each other." },
      { id: 'ch2-s04-body',     label: 'Body',            type: 'textarea', group: 'S04 — Org Structure', default: 'myHQ operates through a flat, function-led structure. Each business vertical has its own P&L, but all teams share tech, operations, and brand infrastructure centrally.' },
      { id: 'ch2-s05-title',    label: 'Title',           type: 'input',    group: 'S05 — Scale & Reach', default: 'Scale & Reach' },
      { id: 'ch2-s05-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S05 — Scale & Reach', default: "myHQ's scale, partner network, and reach — the numbers that reflect platform depth and market trust." },
      { id: 'ch2-s05-body',     label: 'Body',            type: 'textarea', group: 'S05 — Scale & Reach', default: "myHQ has built India's most comprehensive flexible workspace platform. The numbers reflect a business that has scaled across clients, cities, products, and operators — all through a single technology platform." },
      { id: 'ch2-s06-title',    label: 'Title',           type: 'input',    group: 'S06 — The Ambition 2030', default: 'The Ambition — 2030' },
      { id: 'ch2-s06-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S06 — The Ambition 2030', default: "myHQ's 2030 growth plan — the numbers, the drivers, and the opportunity ahead." },
      { id: 'ch2-s06-body',     label: 'Body',            type: 'textarea', group: 'S06 — The Ambition 2030', default: "From ₹20 Cr in FY22 to ₹1,200 Cr in FY26 — myHQ has grown 35X in three years. The next milestone is ₹5,000 Cr in transactions and ₹500 Cr in revenue by FY30. The market for flexible commercial real estate in India is massive — myHQ has barely scratched the surface." },
      { id: 'ch2-s07-title',    label: 'Title',           type: 'input',    group: 'S07 — Success Stories', default: 'Success Stories' },
      { id: 'ch2-s07-outcome',  label: 'Learning Outcome',type: 'textarea', group: 'S07 — Success Stories', default: 'Our leaders grew from within — understand the growth paths that are possible at myHQ.' },
      { id: 'ch2-s07-body',     label: 'Body',            type: 'textarea', group: 'S07 — Success Stories', default: "myHQ's best leaders started as individual contributors. Here are people who've grown from junior roles to leading teams and verticals — proof that the path to leadership is open for those who deliver." },
    ],
    assessFields: [
      { id: 'ch2-assess-q1', label: 'Question 1', type: 'textarea', default: 'The term "Assisted Marketplace" is a deliberate choice. What does it reveal about myHQ\'s approach to the brokerage business, and why does the company prefer this model over a traditional brokerage approach?' },
      { id: 'ch2-assess-q2', label: 'Question 2', type: 'textarea', default: 'Pick anyone from the myHQ leadership team — a city lead, product lead, or business head — and tell their story. What brought them here and what have they built? (Not your direct manager.)' },

      { id: 'ch3-sl5-c2t', label: 'Card 2 Title', type: 'input', group: 'Slide 5 — Non-Negotiables', default: 'Anti-Bribery &amp; Integrity' },
      { id: 'ch3-sl5-c2b', label: 'Card 2 Body', type: 'textarea', group: 'Slide 5 — Non-Negotiables', default: 'Any act of bribery = immediate termination, all bonuses and ESOPs lapse. Gifts &gt;₹1,000 need approval. Moonlighting must be declared to Finance Controller before you begin.' },

    contentFields: [
      { id: 'ch3-intro-body', label: 'Body', type: 'textarea', group: 'Read Mode — Intro', default: 'myHQ\'s benefits and policies are built around three groups: you personally, your work family (colleagues), and your actual family. This chapter walks through your financial benefits, leave entitlements, how attendance and WFH work, the HRMS tool you\'ll use every day (Keka), and three non-negotiables that apply to every employee from day one.' },
      { id: 'ch3-s01-title', label: 'Title', type: 'input', group: 'Read Mode — S01 The 3 Pillars', default: 'The 3 Pillars' },
      { id: 'ch3-s01-body', label: 'Body', type: 'textarea', group: 'Read Mode — S01 The 3 Pillars', default: '<p class="section-body" style="margin-bottom:20px;">myHQ\'s people philosophy: three things need to work in parallel for you to thrive — you as an individual, your work relationships, and your family at home.</p> <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;"> <div style="border:1px solid var(--hairline);border-radius:var(--radius);padding:20px;background:#FFFDF5;"> <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"> <div style="width:36px;height:36px;border-radius:8px;background:rgba(255,184,72,0.15);display:flex;align-items:center;justify-content:center;"><i class="fa-solid fa-hand" style="font-size:18px;color:#C97A1A;"></i></div> <span style="font-size:15px;font-weight:800;color:var(--ink);">For You</span> </div> <ul class="section-list"> <li>HSBC banking — 2–5% cashback on all spends</li> <li>Flexi benefits — fuel, car, driver, phone, food (tax-saving reimbursements)</li> <li>Optional 12% PF to build a larger retirement corpus</li> <li>Free &amp; anonymous mental wellness counselling</li> <li>Buddy Programme for your first 3 months</li> </ul> </div> <div style="border:1px solid var(--hairline);border-radius:var(--radius);padding:20px;background:#F5F7FF;"> <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"> <div style="width:36px;height:36px;border-radius:8px;background:rgba(30,34,170,0.08);display:flex;align-items:center;justify-content:center;"><i class="fa-solid fa-people-group" style="font-size:18px;color:var(--blue);"></i></div> <span style="font-size:15px;font-weight:800;color:var(--ink);">Work Family</span> </div> <ul class="section-list"> <li>Annual offsite — 3 days, 2 nights, another city</li> <li>Monthly/quarterly RnR — trips, Amazon vouchers, trophies</li> <li>Friday evening team snacks</li> <li>Quarterly team dinner budget</li> <li>POSH policy — safe workplace for everyone</li> </ul> </div> <div style="border:1px solid var(--hairline);border-radius:var(--radius);padding:20px;background:#F5FFF6;"> <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"> <div style="width:36px;height:36px;border-radius:8px;background:rgba(190,229,194,0.4);display:flex;align-items:center;justify-content:center;"><i class="fa-solid fa-house" style="font-size:18px;color:#2a7d3a;"></i></div> <span style="font-size:15px;font-weight:800;color:var(--ink);">Your Family</span> </div> <ul class="section-list"> <li>PLUM health insurance — ₹3L/year, covers spouse, kids, parents/in-laws</li> <li>PLUM term life — 3x salary (min ₹15L)</li> <li>Maternity &amp; paternity leaves</li> <li>Bereavement leave for immediate family</li> <li>Crèche &amp; daycare support for working parents</li> </ul> </div> </div>' },
      { id: 'ch3-s01-takeaway', label: 'Takeaway', type: 'input', group: 'Read Mode — S01 The 3 Pillars', default: 'The company invests in three layers — not just your salary. Know what you\'re entitled to and use it.' },
      { id: 'ch3-s02-title', label: 'Title', type: 'input', group: 'Read Mode — S02 Benefits & Pay', default: 'Benefits &amp; Pay Structure' },
      { id: 'ch3-s02-body', label: 'Body', type: 'textarea', group: 'Read Mode — S02 Benefits & Pay', default: '<p class="section-body">Your compensation is more than your monthly salary. Here is what myHQ provides, several items over and above your CTC:</p> <ul class="section-list"> <li><strong>PLUM Health Insurance:</strong> ₹3L/year. Covers self, spouse, children, parents/in-laws. Sign up any time — no deadline. Over and above CTC.</li> <li><strong>PLUM Term Life:</strong> 3x monthly salary (min ₹15L, max ₹45L). Sign up any time. Also above CTC.</li> <li><strong>HSBC Banking:</strong> New account on joining. 2–5% cashback + exclusive offers (Swiggy, Amazon Prime, BookMyShow, Mokobara).</li> <li><strong>Flexi Benefits:</strong> Tax-saving reimbursements on fuel, car, driver, phone, and food — structured into your pay to reduce taxable income.</li> <li><strong>PF — Option 1 (default):</strong> ₹1,800 employee + ₹1,800 employer = ₹3,600/month total.</li> <li><strong>PF — Option 2:</strong> 12% of basic (both sides). 8–8.5% compound interest. Up to ₹1.5L deductible under 80C.</li> <li><strong>Variable Pay:</strong> Annual variable post-appraisal (May/June). Sales incentives monthly. Appraisal cycle: Apr–Mar.</li> <li><strong>Uber Corporate:</strong> AM team only. Official client visits. Cap: ₹5K–8K/month by role. See policy below.</li> </ul>' },
      { id: 'ch3-s02-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S02 Benefits & Pay', default: 'Activate PLUM health and life insurance via the invite link — they\'re above your CTC and you can sign up at any time, with no deadline. Do it early so you and your family are covered.' },
      { id: 'ch3-s03-title', label: 'Title', type: 'input', group: 'Read Mode — S03 Leave & Work Policy', default: 'Leave &amp; Work Policy' },
      { id: 'ch3-s03-body', label: 'Body', type: 'textarea', group: 'Read Mode — S03 Leave & Work Policy', default: '<h3 class="section-subhead">Leave Types</h3> <ul class="section-list"> <li><strong>WL</strong> — Wellness Leave</li> <li><strong>PL</strong> — Paid (Privileged) Leave</li> <li><strong>CL</strong> — Casual Leave</li> <li><strong>Special</strong> — Birthday / Anniversary</li> <li><strong>Mat / Pat</strong> — Maternity &amp; Paternity (parenting)</li> <li><strong>Marriage</strong> — Your own wedding</li> <li><strong>Pet</strong> — Pet adoption</li> <li><strong>Floater</strong> — Flexible day</li> <li><strong>Bereavement</strong> — Loss of immediate family</li> <li><strong>Comp Off</strong> — For working on a holiday</li> </ul> <h3 class="section-subhead">How Leaves Work</h3> <ul class="section-list"> <li>Accrue quarterly based on tenure</li> <li>Cycle: Jan–Dec — most leave types expire Dec 31st</li> <li>PLs are the exception: they carry forward up to 60 days into the next year</li> <li>Check Keka for exact balances</li> </ul> <h3 class="section-subhead">WFH Policy</h3> <ul class="section-list"> <li>WFO-first — in office is the default</li> <li>Apply WFH via Keka portal</li> <li>Manager/TL approves</li> <li>Check with your TL if your team allows WFH before assuming</li> </ul> <h3 class="section-subhead">Attendance</h3> <ul class="section-list"> <li>Tracked: VO, On-Demand, Lead Qualification</li> <li>Mark via Keka app — geotagged, must be in building</li> <li>Late arrivals → auto leave deduction after warnings</li> <li>Corrections must be made within 2–3 days</li> </ul>' },
      { id: 'ch3-s03-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S03 Leave & Work Policy', default: 'Know your leave types and apply on time via Keka. Don\'t wait — PLs are the only ones that carry forward, and the rest expire December 31st.' },
      { id: 'ch3-s04-title', label: 'Title', type: 'input', group: 'Read Mode — S04 Keka HRMS', default: 'Keka HRMS' },
      { id: 'ch3-s04-body', label: 'Body', type: 'textarea', group: 'Read Mode — S04 Keka HRMS', default: '<p class="section-body">Keka is myHQ\'s HRMS — the single platform for everything people-related. You will use it from day one, every day. Here\'s what you\'ll do on it:</p> <ul class="section-list"> <li><strong>Apply Leaves:</strong> All leave requests go through Keka. WhatsApp or email doesn\'t count.</li> <li><strong>Payslips &amp; Tax:</strong> Download payslips, submit investment declarations &amp; tax proofs.</li> <li><strong>Expenses &amp; Claims:</strong> Submit travel and client reimbursements. Not on Keka = not processed.</li> <li><strong>HR &amp; IT Helpdesk:</strong> Raise tickets for laptop issues, ID cards, access requests, onboarding queries.</li> <li><strong>Referrals:</strong> Only Keka referrals qualify for the bonus. Email referrals don\'t count.</li> <li><strong>Attendance:</strong> VO, On-Demand &amp; LQ teams mark on the Keka app (geotagged). Corrections within 2–3 days.</li> <li><strong>Holiday Calendar:</strong> Official holiday list for the year lives on Keka. Check before planning.</li> <li><strong>Search Everything:</strong> Find policies, org chart, colleagues &amp; team information all in one place.</li> </ul>' },
      { id: 'ch3-s04-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S04 Keka HRMS', default: 'Keka is not optional — it is the only official channel for leaves, payslips, expenses, referrals, and helpdesk. If it\'s not on Keka, it doesn\'t exist.' },
      { id: 'ch3-s05-title', label: 'Title', type: 'input', group: 'Read Mode — S05 Non-Negotiables', default: 'Non-Negotiables' },
      { id: 'ch3-s05-body', label: 'Body', type: 'textarea', group: 'Read Mode — S05 Non-Negotiables', default: '1. POSH Training — Mandatory Before First Salary\n\nmyHQ has a Prevention of Sexual Harassment (POSH) policy in line with the Sexual Harassment of Women at the Workplace Act. Training is conducted by their partner, Serein. It is a 45-minute online session and must be completed within one month of joining. Your first month\'s salary will not be processed until POSH training is complete. This is non-negotiable.\n\n2. Anti-Bribery, Gifting & Moonlighting\n\n- Bribery: Absolute zero tolerance. Any act of bribery — to government officials, commercial parties, or space admins — results in immediate termination. All pending bonuses and ESOPs lapse instantly.\n\n- Giving gifts: Allowed (chocolates, stationery, etc.) but no cash, gift vouchers, or alcohol. Any gift above ₹1,000 needs management approval. No gifts to government officials.\n\n- Receiving gifts: Any gift above ₹1,000 also needs approval. Receipt of alcohol bottles or gift vouchers is not allowed.\n\n- Moonlighting / Additional income: Any consulting, freelancing, or mentorship income must be reported to the Finance Controller before you begin. Once approved, you may proceed. Income from your own capital investments is exempt.' },
      { id: 'ch3-s05-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S05 Non-Negotiables', default: 'POSH training before your first salary — no exceptions. Zero tolerance on bribery: it means immediate termination. These are the lines you never cross.' },    ],

  amch1: {
    label: 'Know Your City',
    course: 'beginner',
    slideFields: [
      // Slide 0 — Hero / City Photo Grid
      { id: 'kyg-sl0-headline',      label: 'Headline',                type: 'input',    group: 'Slide 0 — Hero', default: 'Know Your City' },
      { id: 'kyg-sl0-sub',           label: 'Sub-heading',             type: 'input',    group: 'Slide 0 — Hero', default: 'Before you can sell a city, you have to know it.' },
      { id: 'kyg-sl0-eyebrow',       label: 'Eyebrow',                 type: 'input',    group: 'Slide 0 — Hero', default: 'Gurugram · AM Chapter 1' },
      // Slide 1 — History
      { id: 'kyg-sl1-eyebrow',       label: 'Eyebrow',                 type: 'input',    group: 'Slide 1 — History', default: 'Gurugram · History' },
      { id: 'kyg-sl1-headline',      label: 'Headline',                type: 'input',    group: 'Slide 1 — History', default: 'From Villages to a Global Business Hub' },
      { id: 'kyg-sl1-sub',           label: 'Sub-heading',             type: 'input',    group: 'Slide 1 — History', default: 'Three transformations that built modern Gurugram — each one changing who lived here and why.' },
      { id: 'kyg-sl1-era1-badge',    label: 'Era 1 Badge',             type: 'input',    group: 'Slide 1 — History', default: 'Before 1990s' },
      { id: 'kyg-sl1-era1-title',    label: 'Era 1 Title',             type: 'input',    group: 'Slide 1 — History', default: 'Villages & Agriculture' },
      { id: 'kyg-sl1-era1-body',     label: 'Era 1 Body',              type: 'textarea', group: 'Slide 1 — History', default: 'Gurgaon was a collection of villages surrounded by agricultural land. The economy revolved around farming, livestock, and small local businesses. Connectivity was limited — few imagined this region would become one of India\'s most important business destinations.' },
      { id: 'kyg-sl1-era2-badge',    label: 'Era 2 Badge',             type: 'input',    group: 'Slide 1 — History', default: '1970s–80s — Maruti Arrives' },
      { id: 'kyg-sl1-era2-title',    label: 'Era 2 Title',             type: 'input',    group: 'Slide 1 — History', default: 'Manufacturing Creates the First City' },
      { id: 'kyg-sl1-era2-body',     label: 'Era 2 Body',              type: 'textarea', group: 'Slide 1 — History', default: 'The establishment of Maruti Suzuki transformed Gurgaon into an industrial hub. Thousands of jobs were created, supporting industries emerged, and infrastructure investment began to flow. For the first time, Gurgaon became an employment center — not just a rural district.' },
      { id: 'kyg-sl1-era3-badge',    label: 'Era 3 Badge',             type: 'input',    group: 'Slide 1 — History', default: '2003+ — Private Capital Builds a City' },
      { id: 'kyg-sl1-era3-title',    label: 'Era 3 Title',             type: 'input',    group: 'Slide 1 — History', default: 'DLF & Developer-Led Transformation' },
      { id: 'kyg-sl1-era3-body',     label: 'Era 3 Body',              type: 'textarea', group: 'Slide 1 — History', default: 'Unlike most Indian cities that grew through government planning, Gurgaon was built by private capital. DLF assembled large land parcels, built roads, and created modern commercial districts — turning farmland into Grade-A office complexes, residential townships, and business parks within a generation.' },
      // Slide 2 — City at a Glance (Why Gurugram)
      { id: 'kyg-sl2-cityname',      label: 'City Name',               type: 'input',    group: 'Slide 2 — Why Gurugram', default: 'Gurugram' },
      { id: 'kyg-sl2-tagline',       label: 'Tagline',                 type: 'input',    group: 'Slide 2 — Why Gurugram', default: 'Millennium City · Corporate Capital of North India' },
      { id: 'kyg-sl2-r1-title',      label: 'Reason 1 Title',          type: 'input',    group: 'Slide 2 — Why Gurugram', default: 'Delhi Adjacency' },
      { id: 'kyg-sl2-r1-body',       label: 'Reason 1 Body',           type: 'textarea', group: 'Slide 2 — Why Gurugram', default: 'Shares its boundary with New Delhi — minutes from ministries, embassies, regulators, and national industry bodies. Delhi\'s modern business extension.' },
      { id: 'kyg-sl2-r2-title',      label: 'Reason 2 Title',          type: 'input',    group: 'Slide 2 — Why Gurugram', default: 'IGI Airport — 15–25 Min' },
      { id: 'kyg-sl2-r2-body',       label: 'Reason 2 Body',           type: 'textarea', group: 'Slide 2 — Why Gurugram', default: 'India\'s busiest international gateway is closer to Gurugram\'s CBD than any other major Indian office market. Fastest international travel in North India.' },
      { id: 'kyg-sl2-r3-title',      label: 'Reason 3 Title',          type: 'input',    group: 'Slide 2 — Why Gurugram', default: 'NH-48 — Economic Spine' },
      { id: 'kyg-sl2-r3-body',       label: 'Reason 3 Body',           type: 'textarea', group: 'Slide 2 — Why Gurugram', default: 'India\'s most important economic highway runs through the city — direct access to Delhi and North India\'s industrial hubs.' },
      { id: 'kyg-sl2-r4-title',      label: 'Reason 4 Title',          type: 'input',    group: 'Slide 2 — Why Gurugram', default: 'NCR Ecosystem' },
      { id: 'kyg-sl2-r4-body',       label: 'Reason 4 Body',           type: 'textarea', group: 'Slide 2 — Why Gurugram', default: '30M+ population. India\'s largest urban market for consumers, talent, suppliers, and business partners — all within reach.' },
      { id: 'kyg-sl2-r5-title',      label: 'Reason 5 Title',          type: 'input',    group: 'Slide 2 — Why Gurugram', default: 'North India HQ Advantage' },
      { id: 'kyg-sl2-r5-body',       label: 'Reason 5 Body',           type: 'textarea', group: 'Slide 2 — Why Gurugram', default: 'Gateway to Chandigarh, Jaipur, Lucknow, and Amritsar. The natural base for managing large North India operations from one location.' },
      // Slide 3 — Localities / Commercial Zones
      { id: 'kyg-sl3-eyebrow',       label: 'Eyebrow',                 type: 'input',    group: 'Slide 3 — Commercial Zones', default: 'Know the Map' },
