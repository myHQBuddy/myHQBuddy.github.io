    contentFields: [
      { id: 'kyg-intro-body',        label: 'Intro Body',              type: 'textarea', group: 'Intro', default: 'This chapter covers everything you need to know about Gurugram as a commercial real estate market — its history, geography, key localities, connectivity, economic profile, and the landmarks that demonstrate local expertise.' },
      { id: 'kyg-s01-title',         label: 'Title',                   type: 'input',    group: 'S01 — History of Gurugram', default: 'History of Gurugram' },
      { id: 'kyg-s01-outcome',       label: 'Learning Outcome',        type: 'textarea', group: 'S01 — History of Gurugram', default: 'Understand the three transformations that built modern Gurugram and why each phase matters for a commercial real estate consultant.' },
      { id: 'kyg-s01-era1-title',    label: 'Era 1 Title',             type: 'input',    group: 'S01 — History of Gurugram', default: 'Before 1990s: Villages & Agriculture' },
      { id: 'kyg-s01-era1-body',     label: 'Era 1 Body',              type: 'textarea', group: 'S01 — History of Gurugram', default: 'Gurgaon was a collection of villages surrounded by agricultural land. The economy revolved around farming, livestock, and small local businesses. Connectivity was limited — few imagined this region would become one of India\'s most important business destinations. Name rooted in Dronacharya — guru of the Pandavas.' },
      { id: 'kyg-s01-era2-title',    label: 'Era 2 Title',             type: 'input',    group: 'S01 — History of Gurugram', default: '1970s–80s: Manufacturing Creates the First City' },
      { id: 'kyg-s01-era2-body',     label: 'Era 2 Body',              type: 'textarea', group: 'S01 — History of Gurugram', default: 'The establishment of Maruti Suzuki transformed Gurgaon into an industrial hub. Thousands of jobs were created, supporting industries emerged, and infrastructure investment began to flow. Workers migrated from across Haryana. NH-48 corridor began to develop.' },
      { id: 'kyg-s01-era3-title',    label: 'Era 3 Title',             type: 'input',    group: 'S01 — History of Gurugram', default: '2003+: DLF & Developer-Led Transformation' },
      { id: 'kyg-s01-era3-body',     label: 'Era 3 Body',              type: 'textarea', group: 'S01 — History of Gurugram', default: 'Unlike most Indian cities that grew through government planning, Gurgaon was built by private capital. DLF assembled large land parcels, built roads, and created modern commercial districts — turning farmland into Grade-A office complexes, residential townships, and business parks within a generation. Fortune 500 & MNC headquarters followed.' },
      { id: 'kyg-s02-title',         label: 'Title',                   type: 'input',    group: 'S02 — Why Gurugram', default: 'Why Gurugram' },
      { id: 'kyg-s02-outcome',       label: 'Learning Outcome',        type: 'textarea', group: 'S02 — Why Gurugram', default: "The five strategic advantages that make Gurugram India's most important North India corporate market." },
      { id: 'kyg-s02-body',          label: 'Body',                    type: 'textarea', group: 'S02 — Why Gurugram', default: "Gurugram sits at the intersection of five structural advantages that no other North India city can replicate: immediate proximity to Delhi, proximity to IGI Airport, the NH-48 economic spine, the 30M+ NCR ecosystem, and its position as the natural North India HQ for national operations." },
      { id: 'kyg-s03-title',         label: 'Title',                   type: 'input',    group: 'S03 — Commercial Localities', default: 'Commercial Localities' },
      { id: 'kyg-s03-outcome',       label: 'Learning Outcome',        type: 'textarea', group: 'S03 — Commercial Localities', default: 'Know all 8 commercial corridors — their position, rental range, and the client profile that belongs to each zone.' },
      { id: 'kyg-s03-body',          label: 'Body',                    type: 'textarea', group: 'S03 — Commercial Localities', default: "Gurugram's office market is not one market — it's eight distinct corridors, each with its own supply profile, rental band, and occupier type. Knowing which zone fits which client requirement is the core of local expertise." },
      { id: 'kyg-s04-title',         label: 'Title',                   type: 'input',    group: 'S04 — Connectivity', default: 'Connectivity' },
      { id: 'kyg-s04-outcome',       label: 'Learning Outcome',        type: 'textarea', group: 'S04 — Connectivity', default: 'Understand all four transport modes and which zones they serve — critical for client site visits and commute conversations.' },
      { id: 'kyg-s04-body',          label: 'Body',                    type: 'textarea', group: 'S04 — Connectivity', default: "Gurugram is connected by four distinct transport layers: the IGI Airport (15–25 min via NH-48), the Yellow Line + Rapid Metro network, NH-48 regional roads, and an internal road grid of GCR, GCER, SPR, and Sohna Road. Every client commute question maps to one of these networks." },
      { id: 'kyg-s05-title',         label: 'Title',                   type: 'input',    group: 'S05 — Economic Profile', default: 'Economic Profile' },
      { id: 'kyg-s05-outcome',       label: 'Learning Outcome',        type: 'textarea', group: 'S05 — Economic Profile', default: 'Know the six key sectors driving Gurugram\'s economy and the numbers that back up its position as India\'s most concentrated corporate market.' },
      { id: 'kyg-s05-body',          label: 'Body',                    type: 'textarea', group: 'S05 — Economic Profile', default: "250+ Fortune 500 companies, 300+ GCCs, 50+ NIFTY 100 companies — all in a single city. Gurugram's economy runs on IT/ITeS, GCCs, BFSI, professional services, new-age enterprises, and manufacturing. The flex rental range of ₹80–180/sqft/month reflects the spread from Udyog Vihar to Cyber City." },
      { id: 'kyg-s06-title',         label: 'Title',                   type: 'input',    group: 'S06 — Know Every Corner', default: 'Know Every Corner' },
      { id: 'kyg-s06-outcome',       label: 'Learning Outcome',        type: 'textarea', group: 'S06 — Know Every Corner', default: 'Memorise the 9 landmark locations — why each one matters and what it signals to a client.' },
      { id: 'kyg-s06-body',          label: 'Body',                    type: 'textarea', group: 'S06 — Know Every Corner', default: "Local expertise is demonstrated through details, not directions. These 9 landmarks — from DLF Cyber Hub to IFFCO Chowk — are the reference points your clients already know. Drop them naturally in conversation and you signal ground-level knowledge that builds trust fast." },
      { id: 'kyg-s07-title',         label: 'Title',                   type: 'input',    group: 'S07 — City at a Glance', default: 'City at a Glance' },
      { id: 'kyg-s07-outcome',       label: 'Learning Outcome',        type: 'textarea', group: 'S07 — City at a Glance', default: 'The 7 key metrics that give you instant credibility in any client conversation about Gurugram.' },
      { id: 'kyg-s07-body',          label: 'Body',                    type: 'textarea', group: 'S07 — City at a Glance', default: "70M+ sq ft of Grade A stock. 250+ Fortune 500 companies. 300+ GCCs. 1M+ daily workforce. ₹80–180/sqft flex rental. IGI Airport 15–25 min away. These numbers are your credibility toolkit — know them by heart." },
    ],
    assessFields: [
      { id: 'kyg-assess-q1', label: 'Question 1 (City Presentation)', type: 'textarea', default: 'Prepare and submit a presentation on Gurugram as a commercial real estate market. Cover the city\'s history, key commercial zones, connectivity, and economic profile. Name your file in the format: FirstName_City_Presentation.pptx' },
      { id: 'kyg-assess-q2', label: 'Question 2 (Storytelling Audio)', type: 'textarea', default: 'Record a 3–5 minute audio where you pitch Gurugram to a prospective client as their ideal North India office location. Demonstrate local knowledge — mention specific localities, landmarks, and why the city suits their business. Name your file: FirstName_Storytelling_Audio.mp3' },
    ]
  },

  amch2: {
    label: 'Coworking and Flex',
    course: 'beginner',
    slideFields: [],
    contentFields: [
      { id: 'kys-intro-p1',          label: 'Intro Paragraph 1',         type: 'textarea', group: 'Intro', default: 'In every client conversation, you will be recommending a space — not just a brand. To do that well, you need to know two things: where the space sits (the building) and who operates it (the brand).' },
      { id: 'kys-intro-p2',          label: 'Intro Paragraph 2',         type: 'textarea', group: 'Intro', default: 'This chapter gives you the vocabulary and framework to assess any coworking or flex operator. By the end, you should be able to walk into any coworking center, assess the operator, understand their product mix, and position the right solution for the right client.' },

      { id: 'kys-s01-title',         label: 'Title',                     type: 'input',    group: 'S01 — The Building First', default: 'Start with the Building, Not the Operator' },
      { id: 'kys-s01-body1',         label: 'Body Paragraph 1',          type: 'textarea', group: 'S01 — The Building First', default: 'Before understanding a coworking brand, always understand the building. The building is the foundation of every workspace decision. It determines accessibility, occupier profile, employee experience, parking availability, infrastructure quality, and long-term value.' },
      { id: 'kys-s01-body2',         label: 'Body Paragraph 2',          type: 'textarea', group: 'S01 — The Building First', default: 'These are the nine things you need to know about any building before evaluating the operator inside it:' },
      { id: 'kys-s01-insight',       label: 'Insight',                   type: 'textarea', group: 'S01 — The Building First', default: 'A premium operator in a poor building may struggle, while a good operator in a landmark Grade A building can be highly attractive to clients. The building sets the context — the operator fills it.' },

      { id: 'kys-s02-title',         label: 'Title',                     type: 'input',    group: 'S02 — Brand Division', default: 'Brand Division — Who Operates the Space?' },
      { id: 'kys-s02-body',          label: 'Body',                      type: 'textarea', group: 'S02 — Brand Division', default: 'Flex operators can broadly be divided into Premium and Economical categories. This distinction affects everything: the building they occupy, the clients they attract, the design quality, and the price point.' },
      { id: 'kys-s02-prem-brands',   label: 'Premium Brands (comma-sep)',type: 'input',    group: 'S02 — Brand Division', default: 'WeWork, IndiQube, Smartworks, Table Space, Awfis, Innov8' },
      { id: 'kys-s02-prem-c1',       label: 'Premium Characteristic 1',  type: 'input',    group: 'S02 — Brand Division', default: 'Premium fit-outs and interiors' },
      { id: 'kys-s02-prem-c2',       label: 'Premium Characteristic 2',  type: 'input',    group: 'S02 — Brand Division', default: 'Better common areas and amenities' },
      { id: 'kys-s02-prem-c3',       label: 'Premium Characteristic 3',  type: 'input',    group: 'S02 — Brand Division', default: 'Strong brand recognition' },
      { id: 'kys-s02-prem-c4',       label: 'Premium Characteristic 4',  type: 'input',    group: 'S02 — Brand Division', default: 'Enterprise-grade technology' },
      { id: 'kys-s02-prem-c5',       label: 'Premium Characteristic 5',  type: 'input',    group: 'S02 — Brand Division', default: 'Community management teams' },
      { id: 'kys-s02-prem-c6',       label: 'Premium Characteristic 6',  type: 'input',    group: 'S02 — Brand Division', default: 'Higher pricing' },
      { id: 'kys-s02-eco-brands',    label: 'Economical Brands (comma-sep)', type: 'input', group: 'S02 — Brand Division', default: '91Springboard, Incuspaze, Workshaala, Local brands' },
      { id: 'kys-s02-eco-c1',        label: 'Economical Characteristic 1', type: 'input', group: 'S02 — Brand Division', default: 'Competitive pricing' },
      { id: 'kys-s02-eco-c2',        label: 'Economical Characteristic 2', type: 'input', group: 'S02 — Brand Division', default: 'Functional interiors' },
      { id: 'kys-s02-eco-c3',        label: 'Economical Characteristic 3', type: 'input', group: 'S02 — Brand Division', default: 'Startup-focused clientele' },
      { id: 'kys-s02-eco-c4',        label: 'Economical Characteristic 4', type: 'input', group: 'S02 — Brand Division', default: 'Flexible plans and short commitments' },

      { id: 'kys-s03-title',         label: 'Title',                     type: 'input',    group: 'S03 — Product Division', default: 'Product Division — What Does the Brand Offer?' },
      { id: 'kys-s03-body',          label: 'Body',                      type: 'textarea', group: 'S03 — Product Division', default: 'Every coworking or flex operator offers a set of products designed for different customer segments. Understanding the product mix helps you identify the right solution for each client before you ever walk them into a center.' },
      { id: 'kys-s03-cw-head',       label: 'Coworking Products Heading', type: 'input',  group: 'S03 — Product Division', default: 'Coworking Products' },
      { id: 'kys-s03-cw-sub',        label: 'Coworking Products Sub',    type: 'textarea', group: 'S03 — Product Division', default: 'Flexible solutions for individuals, startups, and small teams. These are entry-level products that require little or no commitment.' },
      { id: 'kys-s03-p1-name',       label: 'CW Product 1 Name',         type: 'input',    group: 'S03 — Product Division', default: 'Hot Desk' },
      { id: 'kys-s03-p1-desc',       label: 'CW Product 1 Description',  type: 'textarea', group: 'S03 — Product Division', default: 'Access to any available desk in a shared area. No fixed seat — ideal for those who don\'t need a permanent setup or work irregular hours.' },
      { id: 'kys-s03-p2-name',       label: 'CW Product 2 Name',         type: 'input',    group: 'S03 — Product Division', default: 'Dedicated Desk' },
      { id: 'kys-s03-p2-desc',       label: 'CW Product 2 Description',  type: 'textarea', group: 'S03 — Product Division', default: 'A fixed desk reserved exclusively for the member. Your desk, your monitor, your setup — just inside a shared floor.' },
      { id: 'kys-s03-p3-name',       label: 'CW Product 3 Name',         type: 'input',    group: 'S03 — Product Division', default: 'Private Cabin' },
      { id: 'kys-s03-p3-desc',       label: 'CW Product 3 Description',  type: 'textarea', group: 'S03 — Product Division', default: 'A private enclosed office within the coworking center. Door, privacy, and your branding — with access to all shared common infrastructure.' },
      { id: 'kys-s03-p4-name',       label: 'CW Product 4 Name',         type: 'input',    group: 'S03 — Product Division', default: 'Day Pass' },
      { id: 'kys-s03-p4-desc',       label: 'CW Product 4 Description',  type: 'textarea', group: 'S03 — Product Division', default: 'Workspace access for a single day. Useful for visiting professionals, freelancers, or teams needing occasional space.' },
      { id: 'kys-s03-p5-name',       label: 'CW Product 5 Name',         type: 'input',    group: 'S03 — Product Division', default: 'Virtual Office' },
      { id: 'kys-s03-p5-desc',       label: 'CW Product 5 Description',  type: 'textarea', group: 'S03 — Product Division', default: 'Business address and GST/company registration services without physical occupancy. Used by businesses that need a credible address without daily on-site operations.' },
      { id: 'kys-s03-ent-head',      label: 'Enterprise Products Heading', type: 'input', group: 'S03 — Product Division', default: 'Enterprise Products' },
      { id: 'kys-s03-ent-sub',       label: 'Enterprise Products Sub',   type: 'textarea', group: 'S03 — Product Division', default: 'Customized solutions for larger organizations. These require longer commitments and often involve design and build involvement from the operator.' },
      { id: 'kys-s03-e1-name',       label: 'Ent Product 1 Name',        type: 'input',    group: 'S03 — Product Division', default: 'Managed Office' },
      { id: 'kys-s03-e1-desc',       label: 'Ent Product 1 Description', type: 'textarea', group: 'S03 — Product Division', default: 'A fully serviced and managed private office. The operator designs, furnishes, and operates the space on the client\'s behalf — the client just moves in.' },
      { id: 'kys-s03-e2-name',       label: 'Ent Product 2 Name',        type: 'input',    group: 'S03 — Product Division', default: 'Built-to-Suit' },
      { id: 'kys-s03-e2-desc',       label: 'Ent Product 2 Description', type: 'textarea', group: 'S03 — Product Division', default: 'Office designed and customized entirely to the client\'s specifications — layout, branding, and infrastructure built from scratch for that client.' },
      { id: 'kys-s03-e3-name',       label: 'Ent Product 3 Name',        type: 'input',    group: 'S03 — Product Division', default: 'Enterprise Suites' },
      { id: 'kys-s03-e3-desc',       label: 'Ent Product 3 Description', type: 'textarea', group: 'S03 — Product Division', default: 'Dedicated office spaces for larger teams requiring private, branded floors or wings within a flex center.' },
      { id: 'kys-s03-e4-name',       label: 'Ent Product 4 Name',        type: 'input',    group: 'S03 — Product Division', default: 'HQ Solutions' },
      { id: 'kys-s03-e4-desc',       label: 'Ent Product 4 Description', type: 'textarea', group: 'S03 — Product Division', default: 'Headquarters-grade office solutions for companies wanting a flagship office with premium address, full amenities, and enterprise-class fit-out.' },
      { id: 'kys-s03-e5-name',       label: 'Ent Product 5 Name',        type: 'input',    group: 'S03 — Product Division', default: 'Campus Solutions' },
      { id: 'kys-s03-e5-desc',       label: 'Ent Product 5 Description', type: 'textarea', group: 'S03 — Product Division', default: 'Multi-floor or multi-building campus arrangements for large organizations with high headcount requirements across a single location.' },
      { id: 'kys-s03-mt-head',       label: 'Meeting & Event Heading',   type: 'input',    group: 'S03 — Product Division', default: 'Meeting & Event Products' },
      { id: 'kys-s03-mt-sub',        label: 'Meeting & Event Sub',       type: 'textarea', group: 'S03 — Product Division', default: 'Bookable spaces available on demand. You don\'t need to be a member to access most of these — they\'re sold by the hour or by the day.' },
      { id: 'kys-s03-m1-name',       label: 'Meeting Product 1 Name',    type: 'input',    group: 'S03 — Product Division', default: 'Meeting Rooms' },
      { id: 'kys-s03-m1-desc',       label: 'Meeting Product 1 Description', type: 'textarea', group: 'S03 — Product Division', default: 'Small rooms for 4–8 people. Ideal for client calls, interviews, and quick team syncs. Most centers charge per hour.' },
      { id: 'kys-s03-m2-name',       label: 'Meeting Product 2 Name',    type: 'input',    group: 'S03 — Product Division', default: 'Conference Rooms' },
      { id: 'kys-s03-m2-desc',       label: 'Meeting Product 2 Description', type: 'textarea', group: 'S03 — Product Division', default: 'Larger rooms for 10–20 people. Used for board presentations, client pitches, and half-day workshops.' },
      { id: 'kys-s03-m3-name',       label: 'Meeting Product 3 Name',    type: 'input',    group: 'S03 — Product Division', default: 'Board Rooms' },
      { id: 'kys-s03-m3-desc',       label: 'Meeting Product 3 Description', type: 'textarea', group: 'S03 — Product Division', default: 'Premium rooms for senior leadership meetings. Often equipped with full AV systems, formal seating, and catering options.' },
      { id: 'kys-s03-m4-name',       label: 'Meeting Product 4 Name',    type: 'input',    group: 'S03 — Product Division', default: 'Training Rooms' },
      { id: 'kys-s03-m4-desc',       label: 'Meeting Product 4 Description', type: 'textarea', group: 'S03 — Product Division', default: 'Classroom-style setup for onboarding sessions, training programs, and learning events. Often have whiteboard walls, projectors, and rearrangeable seating.' },
      { id: 'kys-s03-m5-name',       label: 'Meeting Product 5 Name',    type: 'input',    group: 'S03 — Product Division', default: 'Event Spaces' },
      { id: 'kys-s03-m5-desc',       label: 'Meeting Product 5 Description', type: 'textarea', group: 'S03 — Product Division', default: 'Open, flexible areas for large-format gatherings — product launches, networking events, town halls, and corporate offsites.' },

      { id: 'kys-s04-title',         label: 'Title',                     type: 'input',    group: 'S04 — Configuration & Infrastructure', default: 'Configuration & Infrastructure' },
      { id: 'kys-s04-body',          label: 'Body',                      type: 'textarea', group: 'S04 — Configuration & Infrastructure', default: 'When visiting or assessing a coworking center, know what to look for. Run through these checklists to understand what the operator offers — and whether it matches what your client actually needs.' },
      { id: 'kys-s04-insight',       label: 'Parking Insight',           type: 'textarea', group: 'S04 — Configuration & Infrastructure', default: 'Parking is one of the most commonly raised client objections in Gurugram. Always know the parking situation before recommending a center. Clients with large teams or car-dependent employees will disqualify a center on parking alone — even if everything else is perfect.' },

      { id: 'kys-s05-title',         label: 'Title',                     type: 'input',    group: 'S05 — Amenities Assessment', default: 'Amenities Assessment' },
      { id: 'kys-s05-body',          label: 'Body',                      type: 'textarea', group: 'S05 — Amenities Assessment', default: 'When assessing a center, go through two categories: core amenities that every operator must provide, and meeting room credits which affect the day-to-day value of a membership.' },

      { id: 'kys-s06-title',         label: 'Title',                     type: 'input',    group: 'S06 — Pricing Assessment', default: 'Pricing Assessment' },
      { id: 'kys-s06-body',          label: 'Body',                      type: 'textarea', group: 'S06 — Pricing Assessment', default: 'Never take the first quoted price at face value. Always break it down — what\'s included, what\'s excluded, and what the real monthly cost looks like for your client.' },
    ],
    assessFields: [
      { id: 'kys-assess-q1', label: 'Question 1 (City Micromarket Map)', type: 'textarea', default: 'Map your city — list the key micromarkets, the flex operators present in each, their brand division (Premium / Economical), and the approximate price range per seat per month. Submit as a spreadsheet or presentation.' },
      { id: 'kys-assess-q2', label: 'Question 2 (Inventory Tracker)',    type: 'textarea', default: 'Build an inventory tracker for at least 5 flex centers in your city. For each center, capture: operator name, building name, brand division, available products, total seats, and pricing. Submit as a spreadsheet.' },
      { id: 'kys-assess-q3', label: 'Question 3 (Brand Analysis)',       type: 'textarea', default: 'Pick one Premium and one Economical operator in your city. Write a comparative brand analysis covering: building quality, product mix, pricing, target client profile, and strengths vs. weaknesses. Submit as a document or presentation.' },
    ]
  },

      { id: 'amch3-sl2-p2-name', label: 'Name', type: 'input', group: 'Slide 2 — Call Structure', default: 'Conversation' },
      { id: 'amch3-sl2-p2-time', label: 'Time', type: 'input', group: 'Slide 2 — Call Structure', default: '4–5 minutes' },
      { id: 'amch3-sl2-p2-body', label: 'Body', type: 'textarea', group: 'Slide 2 — Call Structure', default: 'Discover the real requirement. Ask about situation, people, location, configuration, and budget. Listen more than you talk. This is not an interview or question-answer session — it\'s a conversation.' },
      { id: 'amch3-sl2-p3-name', label: 'Name', type: 'input', group: 'Slide 2 — Call Structure', default: 'Summary' },
      { id: 'amch3-sl2-p3-time', label: 'Time', type: 'input', group: 'Slide 2 — Call Structure', default: '1–2 minutes' },
      { id: 'amch3-sl2-p3-body', label: 'Body', type: 'textarea', group: 'Slide 2 — Call Structure', default: 'Read back what you heard. Confirm the requirement, set clear next steps, and close with a specific follow-up commitment.' },
      { id: 'amch3-sl2-insight', label: 'Insight', type: 'textarea', group: 'Slide 2 — Call Structure', default: 'Most calls are lost in the first 30 seconds or the last 2 minutes. A weak opening loses trust before discovery starts. A missing summary leaves the client without a next step.' },

      { id: 'amch3-sl3-r2-source', label: 'Source', type: 'input', group: 'Slide 3 — Before the Call', default: 'Website · LinkedIn About' },
      { id: 'amch3-sl3-r3-label', label: 'Label', type: 'input', group: 'Slide 3 — Before the Call', default: 'Current Office Space' },

      { id: 'amch3-sl3-r4-source', label: 'Source', type: 'input', group: 'Slide 3 — Before the Call', default: 'LinkedIn · Crunchbase · Tracxn' },

      { id: 'amch3-sl3-r5-source', label: 'Source', type: 'input', group: 'Slide 3 — Before the Call', default: 'Might you have been able to cater to some of their competitors?' },
      { id: 'amch3-sl3-r6-label', label: 'Label', type: 'input', group: 'Slide 3 — Before the Call', default: 'Profile of Client' },
      { id: 'amch3-sl3-r6-source', label: 'Source', type: 'input', group: 'Slide 3 — Before the Call', default: 'LinkedIn · lead form' },
      { id: 'amch3-sl3-r7-label', label: 'Label', type: 'input', group: 'Slide 3 — Before the Call', default: 'Search myHQ Account Module — Compulsory' },
      { id: 'amch3-sl3-r7-source', label: 'Source', type: 'input', group: 'Slide 3 — Before the Call', default: 'Check if we have serviced this client in any other city' },

      { id: 'amch3-sl4-script2', label: 'Script Line 2', type: 'textarea', group: 'Slide 4 — Opening Script', default: '"Good morning — this is [Your Name] from myHQ by Anarock. I\'m calling regarding your office space requirement — is this a good time to talk for 2–3 minutes?"' },

      { id: 'amch3-sl4-script4', label: 'Script Line 4', type: 'input', group: 'Slide 4 — Opening Script', default: '"We charge zero brokerage."' },
      { id: 'amch3-sl4-script5', label: 'Script Line 5', type: 'input', group: 'Slide 4 — Opening Script', default: '"The objective of this call is to help you through this process."' },

      { id: 'amch3-sl6-template', label: 'Summary Template', type: 'textarea', group: 'Slide 6 — Summary & Next Steps', default: '"Perfect — you\'re looking for X seats in\nlocation, with\nconfiguration. Monthly budget around\n₹X total / ₹X per seat. Key requirements:\nparking / metro / 24×7. Moving in by\ndate / month."' },

    contentFields: [
      { id: 'amch3-intro-body', label: 'Body', type: 'textarea', group: 'Read Mode — Intro', default: 'Every client interaction is a discovery opportunity. This chapter gives you a repeatable, structured framework for conducting the initial office space enquiry call — from the first word to the confirmed next step.\n\nThe three-part structure works for any city, any client type, and any enquiry size. Master it and you will never walk away from a call without understanding what the client actually needs.' },
      { id: 'amch3-s01-title', label: 'Title', type: 'input', group: 'Read Mode — S01 The 3-Part Call', default: 'The 3-Part Call' },
      { id: 'amch3-s01-body', label: 'Body', type: 'textarea', group: 'Read Mode — S01 The 3-Part Call', default: 'A successful client call has three phases. Each phase has a distinct purpose and a time budget. Together they take 10–15 minutes.\n\nIntroduction — 30–45 seconds\n\nOpen strong. Use the client\'s name first. Establish who you are, earn the right to ask questions, and set a shared purpose for the call. This is where trust is either built or lost before discovery begins.\n\nConversation — 4–5 minutes\n\nDiscover the real requirement by asking across four themes: Situation, People, Location, and Requirements. Listen more than you talk. This is not an interview or question-answer session — it\'s a conversation. The details you uncover here determine the quality of your recommendation.\n\nSummary — 1–2 minutes\n\nRead back what you heard. Confirm seat count, location, configuration, budget, and timeline. Commit to a specific next step before ending the call. Never hang up without a clear follow-up.' },
      { id: 'amch3-s01-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S01 The 3-Part Call', default: 'Most calls are lost in the first 30 seconds or the last 2 minutes. A weak opening loses trust before discovery starts. A missing summary leaves the client without a next step.' },
      { id: 'amch3-s02-title', label: 'Title', type: 'input', group: 'Read Mode — S02 Before the Call', default: 'You Should Know Before the Call' },
      { id: 'amch3-s02-body', label: 'Body', type: 'textarea', group: 'Read Mode — S02 Before the Call', default: 'Two minutes of research before you dial changes your entire opening. Do this on the lead form, LinkedIn, or the company website.\n\nPre-Call Checklist\n\nCompany name — Lead form or CRM. Don\'t mispronounce or misread it.\n\nWhat the company does — Website or LinkedIn. One sentence is enough: "they\'re a fintech startup," "they\'re a logistics firm."\n\nCurrent office space — Google Maps or LinkedIn. Knowing their current setup tells you the scale of the move and any pain points.\n\nEmployee strength & size of organisation\n\n- Employee strength\n\n- Size of organisation — Listed / MNC (where is the headquarters?)\n\nCompetitor — Might you have been able to cater to some of their competitors?\n\nProfile of client — LinkedIn profile of the person you\'re calling. Their role, seniority, and background shapes how you pitch.\n\nSearch myHQ Account Module — Compulsory\n\nCheck if we have serviced this client in any other city before you dial.' },
      { id: 'amch3-s02-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S02 Before the Call', default: '"I understand Finzo Technologies is looking for space in Bangalore for your tech team" opens trust. "I got a lead from your end" closes it.' },
      { id: 'amch3-s03-title', label: 'Title', type: 'input', group: 'Read Mode — S03 Introduction', default: 'Introduction' },
      { id: 'amch3-s03-body', label: 'Body', type: 'textarea', group: 'Read Mode — S03 Introduction', default: 'The recommended opening script. Every line has a purpose. Do not skip any part of it — each element earns something specific from the client.\n\nThe Script\n\n"Hi [Name]!" — Name first, always. It signals that this is a personal call, not a mass dial. It is the first impression.\n\n"Good morning — this is [Your Name] from myHQ by Anarock. I\'m calling regarding your office space requirement — is this a good time to talk for 2–3 minutes?" — Identify yourself, state the reason immediately, and ask permission before launching. A client who says "yes" is already more engaged than one who wasn\'t asked.\n\n"Quick background — we help organizations with their office space needs across all geographies. We work with 5000+ workspace partners and have assisted clients like Rebel Foods, Russell Tobin, JioSaavn, Angel One, Philip Morris, and Zomato in finding the right office solutions." — Name-drop at scale. These are brands the client recognises. This earns instant credibility before a single question is asked.\n\n"We charge zero brokerage." — The biggest barrier to opening up is fear of cost. Remove it in one sentence.\n\n"The objective of this call is to help you through this process." — Frame the call as helping them, not selling to them. This resets the dynamic entirely.' },
      { id: 'amch3-s03-takeaway', label: 'Takeaway', type: 'input', group: 'Read Mode — S03 Introduction', default: 'Name first. Always. It is the first impression.' },
      { id: 'amch3-s04-title', label: 'Title', type: 'input', group: 'Read Mode — S04 What You Need to Know', default: 'What You Need to Know Before the Call' },
      { id: 'amch3-s04-body', label: 'Body', type: 'textarea', group: 'Read Mode — S04 What You Need to Know', default: 'Situation\n\n- Why are they looking for an office? (Client nearby / current office bad / expansion / new setup / tenure finished / cost cutting)\n\nEnd User\n\n- Who will use the office?\n\n- Kind of employees\n\n- Front facing / backend, clients visiting\n\nLocation\n\n- Where do the employees travel from?\n\n- Where do the founders travel from?\n\n- Mode of transportation — metro or personal vehicles?\n\n- What is the location expectation?\n\nConfiguration & Cashflow\n\n- Configuration — seats, cabins, meeting rooms, carpet area?\n\n- What is the budget expectation? (Monthly cashflow — total spend the business can absorb)' },
      { id: 'amch3-s04-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S04 What You Need to Know', default: 'Budget rule: if the client says ₹8K/seat — show options from ₹7K to ₹12K. Budget = 8–15% of monthly salary cost per employee. Never limit your search to their stated number alone.' },
      { id: 'amch3-s04-body2', label: 'Body (continued)', type: 'textarea', group: 'Read Mode — S04 What You Need to Know', default: 'Others\n\n- What is the future growth plan?\n\n- When do they start?\n\n- Who is the decision maker?\n\n- Parking\n\n- Hours of operations\n\n- Are they already in touch with someone / have they looked around?' },
      { id: 'amch3-s05-title', label: 'Title', type: 'input', group: 'Read Mode — S05 Summary & Next Steps', default: 'Summary &amp; Next Steps' },
      { id: 'amch3-s05-body', label: 'Body', type: 'textarea', group: 'Read Mode — S05 Summary & Next Steps', default: 'Before you end the call, read back everything you heard. This builds trust, catches misunderstandings early, and creates a mutual commitment to next steps.\n\nSummary Template\n\n"Perfect — you\'re looking for [X seats] in [location], with [configuration]. Monthly budget around ₹[X total / ₹X per seat]. Key requirements: [parking / metro access / 24×7]. Moving in by [date / month]."\n\nSend this summary to the client in writing after the call.\n\nNext Steps Script\n\n"As the next step, I\'ll identify options that match your requirement and share them with you today."\n\n"Quoted prices typically have 10–15% negotiation room — I\'ll factor that in."\n\n"Once you\'ve reviewed the options, we can organise site visits together."\n\nAlways communicate over company email. Ask: "It would be great if you can share your professional email ID — that helps me generate the best options via our internal system."' },
      { id: 'amch3-s05-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S05 Summary & Next Steps', default: 'Use the client\'s name during the conversation — not just at the start. A name used naturally mid-call signals you\'re engaged, not reading from a script.' },
    ],
    assessFields: [
      { id: 'amch3-assess-q1', label: 'Task 1 Prompt', type: 'textarea', group: 'Assessment — Task 1', default: 'Have a mock call with 2 people from the list below and upload both recordings.' },
      { id: 'amch3-assess-q2', label: 'Task 2 Prompt', type: 'textarea', group: 'Assessment — Task 2', default: 'Call old leads and document 2 case studies where you followed this structure.' },
    ]
  },

    contentFields: [
      { id: 'ch4-intro-body', label: 'Body', type: 'textarea', group: 'Read Mode — Intro', default: '<p class="section-body" style="margin-bottom:0;">Assisted Marketplace (AM) is myHQ\'s consultative office-finding service — covering fixed desks/area, managed office, and conventional leasing. Our consultants work with companies to identify, shortlist, visit, negotiate, and close the right office, end to end. It is myHQ\'s largest revenue-driving vertical.</p>' },
      { id: 'ch4-s01-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S01', default: 'Understand what Assisted Marketplace is, its key benefits, and which client segments it targets.' },
      { id: 'ch4-s01-title', label: 'Title', type: 'input', group: 'Read Mode — S01', default: 'What is Assisted Marketplace?' },
      { id: 'ch4-s01-body', label: 'Body', type: 'textarea', group: 'Read Mode — S01', default: '<p class="section-body">Assisted Marketplace is myHQ\'s consultative solution for companies looking for office space. Most companies looking for an office have never done it before, don\'t know the market, and don\'t have the time to visit dozens of properties. Our consultants assist the client in finding the perfect office solution tailored to their unique needs — across coworking, managed office, or conventional leasing — instead of leaving them to navigate a fragmented, broker-driven market alone.</p> <p class="section-body"><strong>Key benefits of myHQ:</strong></p> <ul class="section-list"> <li><strong>End to End Office Consultant:</strong> one dedicated point of contact owns the search from brief to move-in — the client isn\'t bounced between a broker for the space, a lawyer for the agreement, and an interior team for the fit-out.</li> <li><strong>Zero Brokerage:</strong> clients don\'t pay us a brokerage fee. This removes the single biggest reason companies are wary of going through an intermediary in the first place.</li> <li><strong>Faster Decisions, Smooth Move-ins:</strong> a structured process compresses decision time and de-risks the move — clients aren\'t second-guessing themselves three weeks into a search because they have no benchmark for what "a good deal" looks like.</li> <li><strong>Best Negotiated Prices:</strong> our scale and market knowledge get clients better commercial terms than they\'d get alone, since we run this volume of transactions across the same set of landlords and operators repeatedly.</li> </ul> <p class="section-body"><strong>Target audience</strong> spans three segments, each with different urgency and decision-making style:</p> <ul class="section-list"> <li><strong>Startups:</strong> early and growth stage companies. These clients move fast, often need flexibility built into the deal (shorter lock-ins), and are usually choosing coworking.</li> <li><strong>Mid-Size Companies:</strong> growing businesses, typically 20–100 employees. These clients are often deciding between coworking and a managed office as headcount stabilises.</li> <li><strong>Large Businesses:</strong> larger businesses with a stable headcount. These clients have the scale and predictability to justify a managed office or a full conventional lease.</li> </ul>' },
      { id: 'ch4-s01-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S01', default: 'AM = expert consultant + zero brokerage + best negotiated prices. The client doesn\'t need to know the market — that\'s what we\'re here for.' },
      { id: 'ch4-s02-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S02', default: 'Know the three office solutions AM offers, how each is priced, and when to recommend each.' },
      { id: 'ch4-s02-title', label: 'Title', type: 'input', group: 'Read Mode — S02', default: 'AM Solutions for Clients' },
      { id: 'ch4-s02-body', label: 'Body', type: 'textarea', group: 'Read Mode — S02', default: '<p class="section-body">AM offers three distinct office products, each suited to a different stage and style of company:</p> <div class="minicard-grid"> <div class="minicard"> <i class="fa-solid fa-people-roof"></i> <div class="mc-t">Coworking Spaces</div> <div class="mc-b">Your own reserved desk in a shared, vibrant coworking environment. Open desks (1–100) or cabins (4–100 seater). <strong>Dealing in # of seats.</strong></div> </div> <div class="minicard"> <i class="fa-solid fa-building"></i> <div class="mc-t">Managed Office</div> <div class="mc-b">A fully serviced, custom-built office — designed, furnished, and run for you so your team moves in faster. Generally for 50+ team size. <strong>Dealing in # of seats/sqft.</strong></div> </div> <div class="minicard"> <i class="fa-solid fa-file-contract"></i> <div class="mc-t">Conventional Leasing</div> <div class="mc-b">Long-term leased spaces for companies needing full control &amp; flexibility. Generally for 150+ team size (5,000 sqft+). <strong>Dealing in sqft.</strong></div> </div> </div> <p class="section-body">The three products sit on a spectrum of control versus convenience. <strong>Coworking</strong> trades the lowest control for the highest convenience — the client doesn\'t manage facilities, security, or interiors at all, they just occupy seats. <strong>Managed Office</strong> sits in the middle — the client gets a space built and run to their brand and layout, but myHQ\'s operator still handles the day-to-day running of it. <strong>Conventional Leasing</strong> gives the client full control of the space (their own fit-out, their own facilities management) in exchange for taking on more of the operational and compliance burden themselves.</p> <p class="section-body">This is also why the pricing unit changes as you move along that spectrum: coworking is priced per seat because the operator is selling occupancy, not square footage; managed office blends seats and sqft because the build is customised to headcount; and conventional leasing is priced purely in sqft because the client is taking the whole floor or building, regardless of how many seats they eventually fit into it.</p>' },
      { id: 'ch4-s02-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S02', default: 'Know your client\'s stage and headcount — that tells you which solution fits before you even show them options. Coworking = seats, Managed = seats/sqft, Leasing = sqft.' },
      { id: 'ch4-s03-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S03', default: 'Walk through the six-step consulting process from discovery to move-in, knowing what to evaluate at each stage.' },
      { id: 'ch4-s03-title', label: 'Title', type: 'input', group: 'Read Mode — S03', default: 'End-to-End Consulting in 6 Steps' },
      { id: 'ch4-s03-body', label: 'Body', type: 'textarea', group: 'Read Mode — S03', default: '<p class="section-body">We provide end-to-end consulting at each step, in ALL transactions. Each step has its own checklist of factors a consultant must evaluate before moving the client forward:</p> <ul class="section-list"> <li><strong>1. Strategic Discovery:</strong> Identify potential office space through city and micro-market analysis. Factors: talent pool, competitors, traffic, cost of living. This is where you narrow down the right city and even the right neighbourhood before a single property is shown — getting this wrong means every later step has to be redone.</li> <li><strong>2. Curated Shortlist:</strong> Evaluate and benchmark office space to create a shortlist that can be visited. Factors: budget, connectivity, kind of assets, experience at the centre. The goal is a tight shortlist the client can actually visit in a day or two, not an overwhelming list of every available property.</li> <li><strong>3. Commercial Structuring:</strong> Negotiate and structure commercial terms for the shortlisted options. Factors: cost per sqft/seat, security deposit, lock-in &amp; notice period, upfront cost, regular opex cost, annual escalation. This is the step where myHQ\'s scale and relationships with landlords/operators directly translate into a better deal than the client could get on their own.</li> <li><strong>4. Compliance, Interiors, Legal Advisory:</strong> Double-check all key compliance requirements and consult on interiors efficiency. Factors: fire norms, security compliances, ownership of property, office layout design, registration of office agreement. Skipping this step is how clients end up signing for a space that later fails a fire-safety audit or has an ownership dispute.</li> <li><strong>5. Transition Period Management:</strong> If the new office will take time, support the client through that period. Factors: current office terms, temporary office solution (if needed), regular check-ups on project pace and timeline. A managed office or lease build-out can take weeks to months — this step keeps the client operational in the gap.</li> <li><strong>6. Move-in Date &amp; Month:</strong> Help with the inauguration and any minor issues that come up in the first 1–2 weeks. Factors: inauguration setup, branding in office/building, minor setup issues (interiors/infrastructure). Our job isn\'t done at signing — we stay involved until the client is actually settled in.</li> </ul>' },
      { id: 'ch4-s03-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S03', default: 'Discovery → Shortlist → Structuring → Compliance → Transition → Move-in. Know this process cold — every AM transaction follows it.' },
      { id: 'ch4-s04-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S04', default: 'Know the AM client journey stages in the CRM and the tools you\'ll use day to day.' },
      { id: 'ch4-s04-title', label: 'Title', type: 'input', group: 'Read Mode — S04', default: 'Client Journey &amp; Tools' },
      { id: 'ch4-s04-body', label: 'Body', type: 'textarea', group: 'Read Mode — S04', default: '<p class="section-body">Every AM lead moves through five stages in the CRM, and a consultant should always know exactly which stage each of their leads is sitting in:</p> <ul class="section-list"> <li><strong>Lead Posted:</strong> A new lead is posted into the system — from the myHQ website (our lead generation channel) or other inbound/outbound sources. Nothing happens to a lead until it\'s logged here; an enquiry that isn\'t posted into the system effectively doesn\'t exist for tracking purposes.</li> <li><strong>Lead Qualified:</strong> The qualification team reviews and qualifies the lead — checking that the requirement (city, team size, budget, timeline) is real and specific enough to act on, before it\'s handed to a sales consultant.</li> <li><strong>Options Shared:</strong> The sales point of contact shares workspace options — this is effectively the output of the Strategic Discovery and Curated Shortlist steps from the consulting process.</li> <li><strong>Visit Scheduled:</strong> The client schedules a visit to the workspace. This is the moment a lead becomes a serious prospect rather than a browsing enquiry.</li> <li><strong>Contract + Booking Done:</strong> The workspace is successfully booked by the client — at this point the Commercial Structuring and Compliance steps have already closed out.</li> </ul> <p class="section-body">The AM tech product has two parts: the <strong>myHQ Website</strong> (desktop + mobile), which is our lead generation channel — it has served 5,000+ clients and counting — and our <strong>Internal CRM, which works in tandem with Zoho CRM.</strong> The team manages leads and tracks progress here, and can share proposals directly from the CRM. Keeping the CRM up to date isn\'t optional admin work — it\'s how the qualification team, the sales consultant, and management all stay aligned on where every single deal stands.</p>' },
      { id: 'ch4-s04-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S04', default: 'Lead → Qualify → Options → Visit → Book. The myHQ Website brings leads in; the Internal + Zoho CRM is where you move them through to close.' },
      { id: 'ch4-s05-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S05', default: 'Know the AM scale numbers — AM is the largest revenue driver in the firm.' },
      { id: 'ch4-s05-title', label: 'Title', type: 'input', group: 'Read Mode — S05', default: 'Current Scale (Assisted Marketplace)' },
      { id: 'ch4-s05-body', label: 'Body', type: 'textarea', group: 'Read Mode — S05', default: '<p class="section-body">AM is myHQ\'s largest revenue product. Key scale numbers:</p> <div class="minicard-grid" style="grid-template-columns:repeat(3,1fr);"> <div class="minicard"> <div class="mc-t" style="font-size:22px;color:var(--blue);">10 cities</div> <div class="mc-b">On-ground teams — we service Pan-India (30+ cities), with on-ground support concentrated in 10.</div> </div> <div class="minicard"> <div class="mc-t" style="font-size:22px;color:var(--blue);">100 consultants</div> <div class="mc-b">Working with clients on their requirements, end to end.</div> </div> <div class="minicard"> <div class="mc-t" style="font-size:22px;color:var(--blue);">40,000+ seats</div> <div class="mc-b">Leased annually in the flex/coworking industry.</div> </div> <div class="minicard"> <div class="mc-t" style="font-size:22px;color:var(--blue);">1M sqft</div> <div class="mc-b">Conventional leasing — our newest product line, already at 1M sqft.</div> </div> <div class="minicard"> <div class="mc-t" style="font-size:22px;color:var(--blue);">₹35 Cr</div> <div class="mc-b">Our take rate per year — AM is a profitable vertical and the highest revenue driver of the firm.</div> </div> <div class="minicard"> <div class="mc-t" style="font-size:22px;color:var(--blue);">₹300 Cr</div> <div class="mc-b">Annual transaction value — the GMV of space sold.</div> </div> </div>' },
      { id: 'ch4-s05-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S05', default: '₹35Cr take rate, ₹300Cr GMV, 100 consultants, 10 cities. You\'re joining the largest and most profitable vertical in the firm.' },
    ],

    contentFields: [
      { id: 'ch5-intro-body', label: 'Body', type: 'textarea', group: 'Read Mode — Intro', default: '<p class="section-body" style="margin-bottom:0;">Virtual Office (VO) is myHQ\'s address-as-a-service product — covering mailing address, GST registration, and company registration. It gives individuals and companies access to a professional business address without actually renting a physical office, helping businesses launch and scale at a fraction of the cost. The entire process — discovery, plan selection, KYC, renewals — is digital, and it is myHQ\'s highest-volume product.</p>' },
      { id: 'ch5-s01-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S01', default: 'Understand what Virtual Office is, what it includes, and why myHQ over a competitor.' },
      { id: 'ch5-s01-title', label: 'Title', type: 'input', group: 'Read Mode — S01', default: 'What is a Virtual Office?' },
      { id: 'ch5-s01-body', label: 'Body', type: 'textarea', group: 'Read Mode — S01', default: '<p class="section-body">Virtual office is a service offering that gives individuals and companies access to a professional business address without actually renting a physical office space. We help businesses launch and scale at a fraction of the cost. Clients get government-compliant documents along with mail &amp; package handling services.</p> <p class="section-body">In India, you can\'t get a GST number, register a company, or even open certain bank accounts without a registered business address in the relevant state. That address requirement used to force businesses to either lease real space they didn\'t need yet, or use a friend\'s or relative\'s address informally (which creates compliance risk down the line). VO solves this directly — it\'s the address requirement, sold as a service, without the office attached to it.</p> <p class="section-body">A Virtual Office from myHQ can include:</p> <ul class="section-list"> <li><strong>Professional business address</strong> — at a branded workspace location, so the business has a credible address on its invoices, website, and registrations rather than a residential one.</li> <li><strong>Support for GST Registration</strong> — register for GST in any state using the address. This is the single most common reason a client buys a VO.</li> <li><strong>Support for Company Registration</strong> — use the address as your registered office for MCA/ROC filings.</li> <li><strong>Mail &amp; package handling</strong> — receive and forward business correspondence, so the client doesn\'t need anyone physically present at the address.</li> </ul> <p class="section-body"><strong>Why choose myHQ?</strong> Hassle-free, 100% digital process — no branch visits at any stage. Super fast documentation, so a client isn\'t stuck waiting weeks for a registration that\'s blocking their business launch. Verified partners and full transparency, which matters because a VO address that fails verification can get a client\'s GST registration rejected. 300+ premium addresses across 25+ cities, covering 20 states. And a money-back guarantee, which removes the risk for a client buying a service they\'ve likely never bought before.</p>' },
      { id: 'ch5-s01-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S01', default: 'VO = real address, real registration, no physical space — 100% digital, with a money-back guarantee. Perfect for businesses that need credibility before they need a desk.' },
      { id: 'ch5-s02-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S02', default: 'Walk through the 4-step pre-purchase journey a client follows to buy a Virtual Office on myHQ.' },
      { id: 'ch5-s02-title', label: 'Title', type: 'input', group: 'Read Mode — S02', default: 'Pre-Purchase Journey' },
      { id: 'ch5-s02-body', label: 'Body', type: 'textarea', group: 'Read Mode — S02', default: '<p class="section-body">Buying a Virtual Office on myHQ is a fully digital, four-step process:</p> <div class="minicard-grid"> <div class="minicard"> <i class="fa-solid fa-magnifying-glass"></i> <div class="mc-t">1. Discovery</div> <div class="mc-b">Find VO across the country based on criteria: state, location, price, plan.</div> </div> <div class="minicard"> <i class="fa-solid fa-building"></i> <div class="mc-t">2. Choose a Workspace</div> <div class="mc-b">Compare and choose a space you like based on your preferences.</div> </div> <div class="minicard"> <i class="fa-solid fa-list-check"></i> <div class="mc-t">3. Select a Plan &amp; Tenure</div> <div class="mc-b">Plans and tenures according to user needs — GST, registration, address-only.</div> </div> <div class="minicard"> <i class="fa-solid fa-credit-card"></i> <div class="mc-t">4. Checkout</div> <div class="mc-b">Complete payment and start post-purchase KYC.</div> </div> </div> <p class="section-body">The state and city selected in Discovery isn\'t a preference — it\'s usually fixed by where the client needs to register for GST or incorporate, so this step is really about finding the right address within a constraint, not browsing for the nicest option. The plan selected in step 3 also determines which documents the client will need to provide at KYC, which is why getting the plan right upfront avoids back-and-forth later — a GST-only plan needs different paperwork than a full company registration plan.</p>' },
      { id: 'ch5-s02-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S02', default: 'Discovery → Choose → Select Plan → Checkout. Fully digital, no branch visits — the client can complete this end to end on the app or website.' },
      { id: 'ch5-s03-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S03', default: 'Know what happens after a client buys — the dashboards and processes that keep the subscription running.' },
      { id: 'ch5-s03-title', label: 'Title', type: 'input', group: 'Read Mode — S03', default: 'Post-Purchase Journey' },
      { id: 'ch5-s03-body', label: 'Body', type: 'textarea', group: 'Read Mode — S03', default: '<p class="section-body">Once a client purchases, the relationship is managed through four ongoing processes:</p> <div class="minicard-grid"> <div class="minicard"> <i class="fa-solid fa-gauge"></i> <div class="mc-t">1. Client Dashboard</div> <div class="mc-b">Client dashboard to keep track of the subscription — complete digital KYC and signature.</div> </div> <div class="minicard"> <i class="fa-solid fa-server"></i> <div class="mc-t">2. Supply Dashboard</div> <div class="mc-b">Auto-generation of documents to reduce operational bandwidth, plus real-time updates and a data overview of all subscriptions.</div> </div> <div class="minicard"> <i class="fa-solid fa-file-circle-check"></i> <div class="mc-t">3. Subscription Fulfillment</div> <div class="mc-b">All documents shared in minimum TAT on the dashboard.</div> </div> <div class="minicard"> <i class="fa-solid fa-rotate"></i> <div class="mc-t">4. Renewal Management</div> <div class="mc-b">Renewal of client subscriptions before the plan expires.</div> </div> </div> <p class="section-body">The subscription status moves through stages visible to both the client and the supply partner: <strong>KYC Verification → Agreement Signature → Processing Documents → Active → Expired.</strong></p> <p class="section-body">This matters operationally because VO isn\'t a one-time sale — it\'s a subscription that needs to stay valid for as long as the client\'s GST registration or company registration depends on it. If a client\'s VO lapses because a renewal was missed, their registered address effectively stops being valid, which can put their GST compliance at risk. That\'s why the Supply Dashboard auto-generates documents (utility bills, NOCs, agreements) on a recurring basis instead of relying on someone remembering to regenerate them manually, and why Renewal Management exists as its own dedicated step rather than being left to the client to notice.</p>' },
      { id: 'ch5-s03-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S03', default: 'VO doesn\'t end at checkout — the supply dashboard auto-generates documents and the client dashboard tracks KYC, agreement, and renewal status in real time.' },
      { id: 'ch5-s04-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S04', default: 'Know the different types of businesses that need Virtual Office and why, so you can identify potential clients.' },
      { id: 'ch5-s04-title', label: 'Title', type: 'input', group: 'Read Mode — S04', default: 'Who Needs Virtual Office' },
      { id: 'ch5-s04-body', label: 'Body', type: 'textarea', group: 'Read Mode — S04', default: '<p class="section-body">All types of businesses need Virtual Office — demand cuts across industries and business sizes:</p> <ul class="section-list"> <li><strong>Startups:</strong> Launch in a new city with a credible address before committing to physical office space. A founder can register a company and get GST sorted in days, then decide on real office space only once the business actually needs it.</li> <li><strong>Corporates:</strong> Establish a regional entity or satellite presence in a new city as they expand — without hiring a local team or signing a long lease. A lot of corporates need this as they expand to different cities, especially when entering a new state purely to be GST-compliant for sales there, not because they need headcount on the ground.</li> <li><strong>E-commerce sellers &amp; Freelancers:</strong> Many platforms require a GST number and registered address in the state where the seller operates. An e-commerce seller shipping from a warehouse in one state but selling pan-India may need GST registrations in several states — VO makes that scalable instead of requiring a real office in each one. Freelancers use VO to keep personal and professional addresses separate, which also looks more credible to clients on invoices.</li> </ul> <p class="section-body">Clients myHQ has served include FLiX, Hitachi, YourStory, Dolby, Bombay Shaving Company, NOTO, Lion Air, Unicorn (Apple Premium Reseller), Mahindra Business Solutions, Dream11, Swiggy, Spigen, TEQO by Mahindra, BookMyShow, CBRE, and Ford — spanning new-age D2C brands, large enterprises, and everything in between, which is the clearest signal that VO demand isn\'t tied to company size or industry, only to the need for a compliant address.</p>' },
      { id: 'ch5-s04-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S04', default: 'If a business is expanding to a new city or needs a GST address, they need Virtual Office — that covers most growing businesses, from early-stage startups to large corporates like Ford and CBRE.' },
      { id: 'ch5-s05-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S05', default: 'Know the VO scale numbers and the growth trend over the last three years.' },
      { id: 'ch5-s05-title', label: 'Title', type: 'input', group: 'Read Mode — S05', default: 'Scale &amp; Growth' },
      { id: 'ch5-s05-body', label: 'Body', type: 'textarea', group: 'Read Mode — S05', default: '<p class="section-body">Virtual Office is myHQ\'s highest-volume product by number of companies serviced. Key numbers:</p> <div class="minicard-grid" style="grid-template-columns:repeat(4,1fr);"> <div class="minicard"> <div class="mc-t" style="font-size:22px;color:var(--blue);">30,000+</div> <div class="mc-b">Companies serviced.</div> </div> <div class="minicard"> <div class="mc-t" style="font-size:22px;color:var(--blue);">2,500</div> <div class="mc-b">VOs sold every month.</div> </div> <div class="minicard"> <div class="mc-t" style="font-size:22px;color:var(--blue);">₹4.2 Cr</div> <div class="mc-b">Worth of VOs sold per month.</div> </div> <div class="minicard"> <div class="mc-t" style="font-size:22px;color:var(--blue);">300+ addresses</div> <div class="mc-b">Across 25+ cities, covering 20 states.</div> </div> </div> <p class="section-body">Revenue grew from ₹3.1Cr (2023-24) to ₹14Cr (2025-26) — over 4.5x in two years — while GMV grew from ₹10Cr to ₹50Cr in the same period.</p> <p class="section-body"><strong>We have exclusive rights of WeWork India</strong> for all virtual office and on-demand business. We manage the entire tech backend for WeWork India, and all bookings — even the ones placed on WeWork India\'s own website or app — are managed by us.</p>' },
      { id: 'ch5-s05-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S05', default: 'Revenue 4.5x\'d in two years (₹3.1Cr → ₹14Cr), GMV 5x\'d (₹10Cr → ₹50Cr). Plus exclusive WeWork India rights — myHQ is the largest Virtual Office provider in India.' },
    ],
    assessFields: []
  },

    contentFields: [
      { id: 'ch3-intro-body', label: 'Body', type: 'textarea', group: 'Read Mode — Intro', default: '<p class="section-body" style="margin-bottom:0;">On-Demand is myHQ\'s pay-per-use workspace product — FlexiPass, meeting/training rooms, private cabins and event spaces. It lets anyone, from a freelancer needing a focus day to a company running a recruitment drive, book premium coworking space by the day or by the hour, with no long-term lease. It is myHQ\'s highest-volume, highest-frequency product.</p>' },
      { id: 'ch3-s01-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S01', default: 'Understand what On-Demand is, the four key benefits it offers, and who typically uses it.' },
      { id: 'ch3-s01-title', label: 'Title', type: 'input', group: 'Read Mode — S01', default: 'What is On-Demand (OD)?' },
      { id: 'ch3-s01-body', label: 'Body', type: 'textarea', group: 'Read Mode — S01', default: '<p class="section-body">On-Demand enables users to book workspaces by the day without any long-term commitments. There\'s no lease, no security deposit, no notice period — just book and show up.</p> <p class="section-body"><strong>Key benefits:</strong></p> <ul class="section-list"> <li><strong>Pay-per-day usage:</strong> Only pay for the days you actually use the service.</li> <li><strong>Flexible locations:</strong> Access a wide range of brands and cities through one network.</li> <li><strong>Instant booking:</strong> Book quickly and easily through the app or web.</li> <li><strong>Best pricing:</strong> Get the best deal since this inventory is perishable.</li> </ul> <p class="section-body"><strong>Target audience:</strong></p> <ul class="section-list"> <li><strong>Individuals:</strong> Freelancers and solo workers.</li> <li><strong>Small Teams:</strong> Groups collaborating on a project.</li> <li><strong>Startups:</strong> New businesses needing flexible space.</li> <li><strong>Ad-hoc Work:</strong> Temporary or occasional tasks.</li> <li><strong>Meetings:</strong> Professional spaces for client interactions.</li> <li><strong>Training &amp; Events:</strong> Workshops, seminars, and gatherings.</li> </ul>' },
      { id: 'ch3-s01-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S01', default: 'On-Demand = flexible workspace, booked by the day or hour, at the best price because the inventory is perishable. No commitment, no lease.' },
      { id: 'ch3-s02-outcome', label: 'Learning Outcome', type: 'textarea', group: 'Read Mode — S02', default: 'Know the five OD products, who each is built for, and the booking unit (day vs. hour) for each.' },
      { id: 'ch3-s02-title', label: 'Title', type: 'input', group: 'Read Mode — S02', default: 'OD Products' },
      { id: 'ch3-s02-body', label: 'Body', type: 'textarea', group: 'Read Mode — S02', default: '<p class="section-body">The On-Demand product covers a wide range of use-cases — from solo workdays to large team events — across premium coworking spaces. There are five distinct products:</p> <div class="minicard-grid"> <div class="minicard"> <i class="fa-solid fa-chair"></i> <div class="mc-t">Day Passes &amp; Executive Day Passes</div> <div class="mc-b">Working moms, hybrid teams, professionals without an office. <strong>Book by the day.</strong></div> </div> <div class="minicard"> <i class="fa-solid fa-door-closed"></i> <div class="mc-t">Private Cabins</div> <div class="mc-b">Hybrid/sales team catch-ups, brainstorming sessions, teams without an office. <strong>Book by the day.</strong></div> </div> <div class="minicard"> <i class="fa-solid fa-people-roof"></i> <div class="mc-t">Meeting Rooms / Board Rooms</div> <div class="mc-b">Interviews, board meetings, client presentations. <strong>Book by the hour.</strong></div> </div> <div class="minicard"> <i class="fa-solid fa-chalkboard-user"></i> <div class="mc-t">Training Rooms</div> <div class="mc-b">Upskilling, recruitment drives, on-ground sales team training. <strong>Book by the hour.</strong></div> </div> </div> <div class="minicard-grid" style="grid-template-columns:repeat(4,1fr);"> <div class="minicard"> <i class="fa-solid fa-clapperboard"></i> <div class="mc-t">Event Spaces</div> <div class="mc-b">Video shoots, event launches, meetups, conferences. <strong>Book by the day.</strong></div> </div> </div>' },
      { id: 'ch3-s02-takeaway', label: 'Takeaway', type: 'textarea', group: 'Read Mode — S02', default: 'Day-rate products (passes, cabins, events) suit longer occupancy; hour-rate products (meeting &amp; training rooms) suit short, high-intensity use. Match the product to how long the client will actually be in the room.' },

/* ── Search user ── */
function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('user-result').classList.remove('visible');
  document.getElementById('unlock-card').style.display = 'none';
  currentUser = null;
  currentUserDoc = null;
}

async function searchUser() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  if (!query) return;
  // First try exact email match
  let snap = await db.collection('users').where('email', '==', query).limit(1).get();
  if (!snap.empty) { loadUserResult(snap.docs[0]); return; }
  // Fall back: load all users and find first match by name or email contains query
  const all = await db.collection('users').get();
  const match = all.docs.find(doc => {
    const d = doc.data();
    return (d.email || '').toLowerCase().includes(query) || (d.name || '').toLowerCase().includes(query);
  });
  if (!match) { alert('No user found matching "' + query + '".'); return; }
  loadUserResult(match);
}

function loadUserResult(doc) {
  currentUser    = doc.id;
  currentUserDoc = doc.data();
  const d = currentUserDoc;
  const resultEl = document.getElementById('user-result');
  document.getElementById('result-avatar').textContent = (d.name || d.email || '?')[0].toUpperCase();
  document.getElementById('result-name').textContent   = d.name || '—';
  document.getElementById('result-email').textContent  = d.email || '—';
  const ll = d.lastLogin ? new Date(d.lastLogin.seconds * 1000).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '—';
  document.getElementById('result-lastlogin').textContent = 'Last login: ' + ll;

  const adminArea = document.getElementById('result-admin-area');
  if (d.masterAdmin) {
    adminArea.innerHTML = '<span class="master-badge">Master Admin</span>';
  } else {
    adminArea.innerHTML = `
      <span class="admin-label">Admin access</span>
      <label class="toggle">
        <input type="checkbox" id="admin-toggle" ${d.isAdmin ? 'checked' : ''} onchange="toggleAdmin(this.checked)">
        <span class="toggle-slider"></span>
      </label>`;
  }

  resultEl.classList.add('visible');
  document.getElementById('unlock-card').style.display = '';
  selectCourse('beginner', document.querySelector('.course-pill'));
}

async function toggleAdmin(checked) {

function renderChapterList() {
  const list   = document.getElementById('chapter-list');
  const groups = COURSES[selectedCourse];
  if (!groups || groups.length === 0) {
    list.innerHTML = '<p style="font-size:12px;color:var(--blue-soft);padding:12px 0;">Coming soon — no chapters available yet.</p>';
    return;
  }
  const unlocked = (currentUserDoc?.unlockedChapters?.[selectedCourse] || []);
  const progress = currentUserDoc?.progress || {};

  list.innerHTML = groups.map(group => {
    const rows = group.chapters.map(ch => {
      if (!ch.available) {
        return `<div class="chapter-row dimmed">
          <div><div class="chapter-name">${ch.name}</div>${ch.desc ? `<div class="chapter-desc">${ch.desc}</div>` : ''}</div>
          <button class="unlock-pill na">Coming Soon</button>
        </div>`;
      }
      const isUnlocked  = unlocked.includes(ch.id);
      const chProg      = progress[ch.id] || {};
      const isCompleted = chProg.completed === true;
      const completedAt = chProg.completedAt
        ? new Date(chProg.completedAt.seconds * 1000).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })
        : null;
      const statusBadge = isCompleted
        ? `<span style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;background:#e6f9e9;color:#2e7d32;border:1px solid #BEE5C2;margin-right:8px;">✓ Completed${completedAt ? ' · ' + completedAt : ''}</span>`
        : '';
      return `<div class="chapter-row" id="row-${ch.id}">
        <div><div class="chapter-name">${ch.name}</div>${ch.desc ? `<div class="chapter-desc">${ch.desc}</div>` : ''}</div>
        <div style="display:flex;align-items:center;gap:6px;">
          ${statusBadge}
          <button class="unlock-pill ${isUnlocked ? 'unlocked' : 'locked'}" id="pill-${ch.id}" onclick="toggleChapter('${ch.id}', this)">
            ${isUnlocked ? 'Unlocked' : 'Locked'}
          </button>
        </div>
      </div>`;
    }).join('');

    return `<div style="margin-bottom:8px;">
      <div style="font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--blue-soft);padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px;">${group.section}</div>
      ${rows}
    </div>`;
  }).join('');
}

async function toggleChapter(chId, pill) {
  if (!currentUser) return;
  pill.classList.add('fade');
  setTimeout(() => pill.classList.remove('fade'), 300);

  const ref  = db.collection('users').doc(currentUser);
  const snap = await ref.get();
  const data = snap.data() || {};
  const existingUnlocked = data.unlockedChapters?.[selectedCourse] || [];
  const existingLocked   = data.lockedChapters?.[selectedCourse] || [];
  let updatedUnlocked, updatedLocked;
  if (existingUnlocked.includes(chId)) {
    // Locking: remove from unlocked, and record an explicit admin lock so
    // hub.html's auto-unlock-on-completion logic doesn't silently re-add it.
    updatedUnlocked = existingUnlocked.filter(id => id !== chId);
    updatedLocked   = existingLocked.includes(chId) ? existingLocked : [...existingLocked, chId];
  } else {
    // Unlocking: add to unlocked, clear any admin lock override.
    updatedUnlocked = [...existingUnlocked, chId];
    updatedLocked   = existingLocked.filter(id => id !== chId);
  }
  await ref.set({
    unlockedChapters: { [selectedCourse]: updatedUnlocked },
    lockedChapters:   { [selectedCourse]: updatedLocked }
  }, { merge: true });
  if (!currentUserDoc.unlockedChapters) currentUserDoc.unlockedChapters = {};
  if (!currentUserDoc.lockedChapters)   currentUserDoc.lockedChapters   = {};
  currentUserDoc.unlockedChapters[selectedCourse] = updatedUnlocked;
  currentUserDoc.lockedChapters[selectedCourse]   = updatedLocked;
  renderChapterList();
}

/* ── All users table ── */
const PAGE_SIZE    = 10;
const COLLAPSED    = 8;
let allUsersData   = [];
let currentPage    = 1;
let isExpanded     = false;

async function loadAllUsers() {
  const snap = await db.collection('users').orderBy('lastLogin', 'desc').get();
  allUsersData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
  document.getElementById('users-count').textContent = allUsersData.length + ' users';
  currentPage = 1;
  isExpanded  = false;
  renderUsersTable();
}

function renderUsersTable() {
  const tbody    = document.getElementById('users-tbody');
  const footer   = document.getElementById('users-footer');
  const showBtn  = document.getElementById('show-all-btn');
  const pagCtrl  = document.getElementById('pagination-controls');
  const pageInd  = document.getElementById('page-indicator');
  const total    = allUsersData.length;

  let rows;
  if (!isExpanded) {
    // Collapsed: show first COLLAPSED rows only
    rows = allUsersData.slice(0, COLLAPSED);
  } else {
    // Expanded + paginated (PAGE_SIZE per page)
    const start = (currentPage - 1) * PAGE_SIZE;
    rows = allUsersData.slice(start, start + PAGE_SIZE);
  }

  tbody.innerHTML = rows.map(d => {
    const ll = d.lastLogin ? new Date(d.lastLogin.seconds * 1000).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) : '—';
    const badge = d.masterAdmin
      ? '<span class="badge-master">Master Admin</span>'
      : d.isAdmin ? '<span class="badge-admin">Admin</span>' : '';
    return `<tr onclick="loadUserResultById('${d.id}')">
      <td>${d.name || '—'}</td>
      <td style="font-family:var(--mono);font-size:11px;">${d.email || '—'}</td>
      <td style="font-family:var(--mono);font-size:11px;">${ll}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('');

  // Footer visibility
  if (total <= COLLAPSED) {
    footer.style.display = 'none';
    return;
  }
  footer.style.display = 'flex';

  if (!isExpanded) {
    showBtn.textContent = `Show all ${total} users ↓`;
    pagCtrl.style.display = 'none';
  } else {
    const totalPages = Math.ceil(total / PAGE_SIZE);
    showBtn.textContent = 'Show less ↑';
    pagCtrl.style.display = totalPages > 1 ? 'flex' : 'none';
    pageInd.textContent = `Page ${currentPage} of ${totalPages}`;
    // Disable prev/next at boundaries
    pagCtrl.querySelectorAll('button')[0].disabled = currentPage === 1;
    pagCtrl.querySelectorAll('button')[1].disabled = currentPage === totalPages;
  }
}

function toggleShowAll() {
  isExpanded  = !isExpanded;
  currentPage = 1;
  renderUsersTable();
}

function changePage(dir) {
  const totalPages = Math.ceil(allUsersData.length / PAGE_SIZE);
  currentPage = Math.max(1, Math.min(totalPages, currentPage + dir));
  renderUsersTable();
}
